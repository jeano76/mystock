<style>
:root {
  --bg:#000000; --bg2:#0d0d0d; --bg3:#141414; --bg4:#1a1a1a; --bg5:#222222;
  --border:#1f1f1f; --border2:#2a2a2a;
  --text:#f0f0f0; --text2:#aaaaaa; --text3:#666666; --text4:#3a3a3a;
  --green:#17e8a1; --green2:#0db87f; --green3:rgba(23,232,161,.12);
  --red:#ff4d72; --red3:rgba(255,77,114,.12);
  --blue:#4d9eff; --yellow:#ffb800; --purple:#a78bfa;
  --acc:#3d8ef8; --acc2:#2570d4;
  --mono:'DM Mono',monospace; --sans:'Sora',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;overflow-x:hidden;max-width:100%}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:196px;min-width:196px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:width .22s ease,min-width .22s ease}
.sidebar.collapsed{width:44px;min-width:44px;overflow:hidden}
.sidebar.collapsed .sb-lbl,.sidebar.collapsed .sb-cnt,.sidebar.collapsed .sb-name span:not(.sb-dot),.sidebar.collapsed .sb-add-row,.sidebar.collapsed .sb-sec:not(:first-child){display:none}
.sidebar.collapsed .sb-item{justify-content:center;padding:6px}
.sidebar.collapsed .sb-name{font-size:14px}
.sb-toggle{cursor:pointer;font-size:11px;color:var(--text3);padding:2px 5px;border-radius:4px;line-height:1;flex-shrink:0}
.sb-toggle:hover{background:var(--bg4);color:var(--text)}
.sb-logo-row{display:flex;align-items:center;justify-content:space-between}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:flex-end;flex-shrink:0;position:sticky;top:0;z-index:50;gap:5px;overflow:hidden}
.logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.06em}
.logo em{color:var(--acc);font-style:normal}
.topbar-right{display:flex;gap:5px;align-items:center;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;width:100%;min-width:0;justify-content:flex-end}
.topbar-right::-webkit-scrollbar{display:none}
/* PAGE HEADER */
.page-hdr{display:flex;align-items:flex-end;justify-content:space-between;padding:16px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.page-hdr-left{display:flex;flex-direction:column;gap:3px}
.page-hdr-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.page-hdr-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.page-hdr-acc{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--acc);font-family:var(--mono);background:rgba(61,142,248,.08);border:1px solid rgba(61,142,248,.2);border-radius:4px;padding:2px 7px;margin-top:2px;width:fit-content}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg4);color:var(--text);cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg5);border-color:var(--acc)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--acc);border-color:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc2)}
.btn-sm{padding:3px 9px;font-size:10px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text3)}
.btn-ghost:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.sb-sec{padding:10px 0;border-bottom:1px solid var(--border)}
.sb-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:0 14px 6px}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.sb-item:hover{background:var(--bg3)}
.sb-item.active{background:var(--bg3);border-left-color:var(--acc)}
.sb-name{font-size:11px;color:var(--text);font-weight:500;display:flex;align-items:center;gap:6px}
.sb-cnt{font-family:var(--mono);font-size:9px;color:var(--text3)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-add-row{padding:8px 14px;display:flex;gap:6px}
.sb-add-row input{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:5px;font-size:11px;font-family:var(--sans);outline:none}
.sb-add-row input:focus{border-color:var(--acc)}
.content{padding:14px 18px;flex:1}
.hero{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);border-radius:10px;padding:16px 18px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 85% 0%,rgba(61,142,248,.06),transparent 60%);pointer-events:none}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.hero-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.hero-val{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--text)}
.hero-gain{font-family:var(--mono);font-size:12px;font-weight:500;margin-top:3px}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hstat{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:9px 11px}
.hstat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.hstat-val{font-family:var(--mono);font-size:14px;font-weight:500}
.hstat-sub{font-size:9px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.tabs{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:3px;margin-bottom:12px;gap:2px}
.tab{flex:1;text-align:center;padding:5px 8px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .15s}
.tab.active{background:var(--bg5);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.chart-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.chart-sub{font-size:9px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0}
.donut-wrap{display:flex;gap:12px;align-items:center}
.donut-canvas-wrap{position:relative;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center-val{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text)}
.donut-center-lbl{font-size:8px;color:var(--text3);margin-top:1px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:3px;overflow:auto;max-height:160px}
.legend-item{display:flex;align-items:center;gap:5px;padding:2px 3px;border-radius:3px}
.legend-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.legend-name{font-size:9px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend-pct{font-family:var(--mono);font-size:9px;color:var(--text3)}
.comp-stabs{display:flex;gap:5px;margin-bottom:8px}
.comp-stab{padding:3px 8px;border-radius:5px;font-size:9px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--text3);background:transparent;transition:all .15s}
.comp-stab.active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.bar-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.bar-months{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;align-items:end;height:90px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.bar-amt{font-family:var(--mono);font-size:7px;color:var(--text3);text-align:center;white-space:nowrap;height:12px;display:flex;align-items:flex-end;justify-content:center}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:all .2s;position:relative}
.bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);border-radius:3px 3px 0 0}
.bar-fill.cur{background:var(--yellow)!important}
.bar-fill.gb{background:linear-gradient(180deg,var(--green),var(--green2))}
.bar-fill.empty-b{background:var(--bg4);opacity:.4}
.bar-lbl{font-size:7px;color:var(--text3);font-family:var(--mono)}
.sector-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.sector-bar{height:9px;border-radius:5px;display:flex;overflow:hidden;margin:8px 0}
.sec-seg{height:100%;transition:flex .4s}
.sec-legend{display:flex;flex-wrap:wrap;gap:7px}
.sec-leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
.sec-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--text3);background:transparent;transition:all .15s}
.pill.active{background:var(--acc);border-color:var(--acc);color:#fff}
.pill:hover:not(.active){background:var(--bg4);color:var(--text)}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow-x:auto;overflow-y:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:7px 10px;text-align:left;font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
td{padding:7px 10px;font-size:11px;white-space:nowrap}
td.r{text-align:right}
.ticker-cell{display:flex;align-items:center;gap:6px}
.t-badge{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text);background:var(--bg4);padding:2px 5px;border-radius:4px;border:1px solid var(--border2)}
.t-badge.kr{border-color:rgba(255,184,0,.35);color:var(--yellow)}
.t-name{font-size:9px;color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis}
.num{font-family:var(--mono)}
.g{color:var(--green)}.r2{color:var(--red)}.dim{color:var(--text3)}
.acc-badge{font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(61,142,248,.1);color:var(--acc);border:1px solid rgba(61,142,248,.2)}
.kr-badge{font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(255,184,0,.1);color:var(--yellow);border:1px solid rgba(255,184,0,.2);margin-left:3px}
.grp-row{background:var(--bg3)}
.grp-row td{padding:5px 10px;font-size:10px;font-weight:600;color:var(--text2)}
.grp-info{font-weight:400;color:var(--text3);font-family:var(--mono);font-size:9px;margin-left:8px}
.empty{text-align:center;padding:36px;color:var(--text3)}
.empty-icon{font-size:26px;margin-bottom:7px;opacity:.4}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:460px;max-height:90vh;overflow-y:auto}
.modal-hd{padding:14px 16px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:600}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:11px}
.modal-ft{padding:11px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.field input,.field select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 9px;border-radius:6px;font-size:12px;font-family:var(--sans);outline:none;width:100%;transition:border .15s}
.field input:focus,.field select:focus{border-color:var(--acc)}
.field select option{background:var(--bg3)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.close-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 5px;border-radius:4px}
.close-x:hover{background:var(--bg4);color:var(--text)}
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--acc);border-top:none;border-radius:0 0 6px 6px;z-index:60;max-height:200px;overflow-y:auto}
.ac-item{padding:7px 9px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.ac-item:hover,.ac-item.sel{background:var(--bg4)}
.ac-t{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text);min-width:64px}
.ac-n{font-size:10px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-sec{font-size:9px;color:var(--text3)}
.ac-d{font-size:9px;color:var(--green);font-family:var(--mono)}
.info-chip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:10px;color:var(--text2);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.chip-t{background:rgba(61,142,248,.12);color:var(--acc);font-size:9px;padding:2px 5px;border-radius:3px}
.chip-g{background:rgba(23,232,161,.12);color:var(--green);font-size:9px;padding:2px 5px;border-radius:3px}
.chip-kr{background:rgba(255,184,0,.12);color:var(--yellow);font-size:9px;padding:2px 5px;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .9s linear infinite;display:inline-block}
/* TOAST */
.toast-ctr{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px;max-width:360px;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;pointer-events:all;animation:toastIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast-success{border-left:3px solid var(--green)}
.toast-limit{border-left:3px solid var(--yellow)}
.toast-warn{border-left:3px solid var(--yellow)}
.toast-error{border-left:3px solid var(--red)}
.toast-info{border-left:3px solid var(--acc)}
.toast-icon{font-size:14px;margin-top:1px;flex-shrink:0}
.toast-body{flex:1;min-width:0}
.toast-msg{font-size:11px;color:var(--text);line-height:1.4}
.toast-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono);line-height:1.4}
.toast-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;line-height:1}
.toast-x:hover{color:var(--text)}
@keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
/* API STATUS */
.api-status{display:flex;gap:5px;align-items:center;padding:4px 8px;border-radius:5px;background:var(--bg3);border:1px solid var(--border)}
.api-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default}
.api-dot{width:6px;height:6px;border-radius:50%}
.api-dot-lbl{font-size:7px;font-family:var(--mono);color:var(--text4)}
/* SETTINGS */
.settings-modal{width:520px}
.api-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;display:flex;flex-direction:column;gap:7px}
.api-item-head{display:flex;align-items:center;justify-content:space-between}
.api-item-name{font-size:11px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
.api-item-link{font-size:9px;color:var(--acc);text-decoration:none;opacity:0.7;line-height:1}
.api-item-link:hover{opacity:1}
.api-item-desc{font-size:9px;color:var(--text3);margin-top:2px}
.api-item-status{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:4px;flex-shrink:0}
.api-ok{background:var(--green3);color:var(--green)}
.api-limited{background:rgba(255,184,0,.12);color:var(--yellow)}
.api-nokey{background:var(--bg4);color:var(--text3)}
.api-note{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 11px;font-size:10px;color:var(--text2);line-height:1.7}
.refresh-status{font-size:10px;color:var(--text3);font-family:var(--mono);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* AUTH */
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px 32px;width:400px;display:flex;flex-direction:column;gap:18px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.auth-logo{font-family:var(--mono);font-size:18px;font-weight:500;text-align:center;letter-spacing:.06em;margin-bottom:4px}
.auth-logo em{color:var(--acc);font-style:normal}
.auth-title{font-size:17px;font-weight:600;text-align:center;color:var(--text)}
.auth-sub{font-size:11px;color:var(--text3);text-align:center;line-height:1.7}
.auth-err{background:rgba(255,77,114,.1);border:1px solid rgba(255,77,114,.3);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--red);text-align:center;line-height:1.5}
.auth-warn{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.3);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--yellow);line-height:1.6}
.auth-link{font-size:10px;color:var(--text3);cursor:pointer;text-align:center;margin-top:4px}
.auth-link:hover{color:var(--acc)}
/* COOKIE CONSENT */
.cookie-banner{position:fixed;bottom:0;left:0;right:0;background:var(--bg3);border-top:1px solid var(--border2);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;z-index:900;flex-wrap:wrap}
.cookie-text{font-size:11px;color:var(--text2);line-height:1.6;flex:1;min-width:200px}
.cookie-text a{color:var(--acc);cursor:pointer;text-decoration:underline}
.cookie-btns{display:flex;gap:8px;flex-shrink:0}
/* FOOTER */
.site-footer{background:var(--bg2);border-top:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0}
.footer-links{display:flex;gap:16px;flex-wrap:wrap}
.footer-link{font-size:10px;color:var(--text3);cursor:pointer;text-decoration:none}
.footer-link:hover{color:var(--acc)}
.footer-copy{font-size:10px;color:var(--text4);font-family:var(--mono)}
/* LEGAL MODAL */
.legal-modal{width:600px;max-height:80vh}
.legal-body{padding:20px 24px;font-size:11px;color:var(--text2);line-height:1.9;overflow-y:auto;max-height:60vh}
.legal-body h3{font-size:12px;font-weight:600;color:var(--text);margin:16px 0 6px}
.legal-body h3:first-child{margin-top:0}
.legal-body p{margin-bottom:8px}
.legal-body ul{padding-left:18px;margin-bottom:8px}
.legal-body ul li{margin-bottom:4px}
/* LANG */
.lang-btn{font-size:9px;color:var(--text3);cursor:pointer;padding:2px 8px;border:1px solid var(--border2);border-radius:4px;background:transparent;font-family:var(--mono);letter-spacing:.04em;line-height:1.6}
.lang-btn:hover{color:var(--text);border-color:var(--acc);background:var(--bg4)}
.auth-lang{text-align:center;margin-top:-8px}
/* FILTER MODAL */
.filter-modal-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px;max-height:360px;overflow-y:auto}
.filter-item{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px}
.filter-item-name{flex:1;background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:4px 7px;border-radius:5px;font-size:11px;font-family:var(--sans);outline:none}
.filter-item-name:focus{border-color:var(--acc)}
.filter-type-badge{font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--text3);font-family:var(--mono);flex-shrink:0}
.filter-add-row{display:flex;gap:7px;align-items:center;padding:10px 0 0;border-top:1px solid var(--border);flex-wrap:wrap}
.filter-add-row input{flex:1;min-width:90px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 8px;border-radius:5px;font-size:11px;font-family:var(--sans);outline:none}
.filter-add-row input:focus{border-color:var(--acc)}
.filter-add-row select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 7px;border-radius:5px;font-size:11px;font-family:var(--sans);outline:none}
.filter-add-row select:focus{border-color:var(--acc)}
/* ACCOUNT RENAME */
.acc-rename-input{background:var(--bg4);border:1px solid var(--acc);color:var(--text);padding:2px 6px;border-radius:4px;font-size:11px;font-family:var(--sans);outline:none;width:90px}
/* SORT */
thead th.sortable{cursor:pointer;user-select:none;transition:color .1s}
thead th.sortable:hover{color:var(--text)}
thead th.sort-asc::after{content:' ▲';color:var(--acc);font-size:7px}
thead th.sort-desc::after{content:' ▼';color:var(--acc);font-size:7px}
/* SEARCH */
.search-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.search-input{flex:1;max-width:220px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:6px;font-size:11px;font-family:var(--sans);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--acc)}
.search-input::placeholder{color:var(--text3)}
/* UNDO BAR */
.undo-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:9px 18px;display:flex;align-items:center;gap:14px;z-index:300;font-size:11px;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:fadeInUp .2s ease}
.undo-btn{color:var(--acc);cursor:pointer;font-weight:600;font-size:11px;background:none;border:none;padding:0;font-family:var(--sans)}
.undo-btn:hover{text-decoration:underline}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* IO MODAL */
.io-section{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:6px}
.io-section h4{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px}
.io-section p{font-size:10px;color:var(--text3)}
.io-btns{display:flex;gap:7px;flex-wrap:wrap}
/* HEATMAP */
.heat-cell{border-radius:3px;padding:1px 3px}
/* REBALANCE */
.rebal-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.rebal-row:last-child{border-bottom:none}
.rebal-name{font-size:10px;color:var(--text2);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rebal-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.rebal-bar-wrap{position:relative;background:var(--bg4);border-radius:3px;height:6px;overflow:visible}
.rebal-bar-actual{height:100%;border-radius:3px;transition:width .5s}
.rebal-target-line{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--yellow);border-radius:1px;z-index:2}
.rebal-nums{font-family:var(--mono);font-size:9px;display:flex;gap:6px}
.rebal-input{background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:2px 4px;border-radius:4px;font-size:9px;font-family:var(--mono);width:38px;outline:none;text-align:center}
.rebal-input:focus{border-color:var(--acc)}
/* SNAPSHOT */
.snapshot-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.snap-chart-wrap{height:140px;margin-top:8px}
/* LIGHT THEME */
html.light{--bg:#ffffff;--bg2:#f5f5f5;--bg3:#eeeeee;--bg4:#e4e4e4;--bg5:#d8d8d8;--border:#d0d0d0;--border2:#bbbbbb;--text:#111111;--text2:#444444;--text3:#888888;--text4:#bbbbbb;--green:#0aaf78;--green2:#089060;--green3:rgba(10,175,120,.1);--red:#e02050;--red3:rgba(224,32,80,.1);--acc:#2563eb;--acc2:#1d4ed8}
/* AUTO-REFRESH */
.ar-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:10px;padding:2px 5px;border-radius:4px;font-family:var(--sans);cursor:pointer;outline:none}
.ar-cd{font-family:var(--mono);font-size:9px;color:var(--text3);min-width:28px;text-align:right;white-space:nowrap}
/* NOTE */
.note-icon{font-size:10px;cursor:pointer;color:var(--text3);padding:1px 3px;border-radius:3px;line-height:1}
.note-icon:hover{background:var(--bg4)}
.note-icon.has-note{color:var(--acc)}
.note-wrap{position:relative;display:inline-flex;align-items:center}
.note-tooltip{position:absolute;z-index:200;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--text2);max-width:180px;white-space:pre-wrap;box-shadow:0 4px 12px rgba(0,0,0,.3);left:0;top:100%;margin-top:4px;pointer-events:none}
/* DRAG */
.drag-handle{cursor:grab;color:var(--text4);font-size:13px;padding:0 4px;user-select:none;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
tr.dragging{opacity:.35}
/* COLUMN VISIBILITY */
.col-vis-wrap{position:relative}
.col-vis-drop{position:absolute;right:0;top:calc(100% + 4px);background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px;z-index:60;min-width:155px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.col-vis-item{display:flex;align-items:center;gap:7px;padding:4px 5px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--text2)}
.col-vis-item:hover{background:var(--bg4)}
.col-vis-item input[type=checkbox]{cursor:pointer;accent-color:var(--acc);width:13px;height:13px}
/* BEP */
.bep-val{font-family:var(--mono);font-size:10px;color:var(--text3)}
.bep-tgt{font-family:var(--mono);font-size:9px;color:var(--acc);margin-top:1px}
/* TREEMAP */
.treemap-wrap{width:100%;height:200px;position:relative;border-radius:8px;overflow:hidden;cursor:default}
/* DIVIDEND CALENDAR */
.div-cal{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:8px}
.div-cal-m{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 4px;text-align:center}
.div-cal-m.has-div{background:rgba(23,232,161,.07);border-color:var(--green2)}
.div-cal-mn{font-size:8px;font-weight:600;color:var(--text2);margin-bottom:2px}
.div-cal-ma{font-family:var(--mono);font-size:9px;color:var(--green);font-weight:500}
.div-cal-mt{color:var(--text3);font-size:7px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* ALERTS */
.alert-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.alert-row:last-child{border-bottom:none}
.alert-type{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.alert-above{background:rgba(23,232,161,.12);color:var(--green)}
.alert-below{background:rgba(255,77,114,.12);color:var(--red)}
/* TRADES */
.trade-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;flex-wrap:wrap}
.trade-row:last-child{border-bottom:none}
/* BENCHMARK */
.bench-sel{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.bench-pill{padding:2px 8px;border-radius:10px;font-size:9px;cursor:pointer;border:1px solid var(--border2);color:var(--text3);background:transparent;transition:all .1s}
.bench-pill.active{background:var(--acc);border-color:var(--acc);color:#fff}
/* LOTS */
.lots-table{width:100%;font-size:10px;border-collapse:collapse;margin-top:6px}
.lots-table th{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;padding:3px 5px;border-bottom:1px solid var(--border);text-align:left}
.lots-table td{padding:4px 5px;border-bottom:1px solid var(--border);font-family:var(--mono)}
.lots-table tr:last-child td{border-bottom:none}
/* PRINT */
@media print{
  .sidebar,.topbar,.page-hdr,.tabs,.pills,.search-row,.undo-bar,.toast-ctr,.sidebar-backdrop,
  .site-footer,.cookie-banner,.legal-modal-overlay,.overlay,.btn{display:none!important}
  .main{margin-left:0!important}.app{height:auto;overflow:visible}
  body,html{background:#fff;color:#000;overflow:visible}
  .hero{background:#f5f5f5;border:1px solid #ddd;-webkit-print-color-adjust:exact}
  .hero-val,.hstat-val,.hero-gain{color:#000!important}
  .tbl-wrap{overflow:visible}.chart-card,.bar-card,.snapshot-card,.sector-card{page-break-inside:avoid}
  .content{padding:12px}.hero,.charts-row,.chart-card{margin-bottom:8px}
}
/* SIDEBAR BACKDROP */
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;cursor:pointer}
/* MOBILE ≤640px */
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:100;box-shadow:2px 0 16px rgba(0,0,0,.35)}
  .sidebar:not(.collapsed){width:220px;min-width:220px;overflow-y:auto;overflow-x:hidden}
  .main{margin-left:44px}
  .sidebar-backdrop{display:block}
  .content{padding:10px 8px}
  .page-hdr{padding:10px 10px 6px}
  td{padding:5px 7px;font-size:10px}
  thead th{padding:5px 7px;font-size:8px}
  .topbar{padding:0 8px}
  .charts-row{grid-template-columns:1fr}
  .hero{flex-direction:column;gap:8px}
  .hero-stats{flex-wrap:wrap;gap:8px}
  .auth-card{width:90vw;padding:24px 18px}
}
/* TABLET 641-1024px */
@media(min-width:641px) and (max-width:1024px){
  .hero-stats{flex-wrap:wrap}
  .content{padding:12px 14px}
}

function applyFilter(positions,f){
  if(!f||f.type==='all') return positions;
  if(f.type==='us') return positions.filter(function(p){var s=STOCKS.find(function(st){return st.t===p.ticker});return !s||s.r==='US'});
  if(f.type==='kr') return positions.filter(function(p){var s=STOCKS.find(function(st){return st.t===p.ticker});return s&&s.r==='KR'});
  if(f.type==='etf') return positions.filter(function(p){var s=STOCKS.find(function(st){return st.t===p.ticker});return s&&s.s==='ETF'});

  return positions;
}

function getRLS(){try{return JSON.parse(localStorage.getItem('pfm_rl')||'{}')}catch{return{}}}
function setRLS(v){try{localStorage.setItem('pfm_rl',JSON.stringify(v))}catch{}}
function checkRL(api){
  const rl=getRLS(),s=rl[api];
  if(!s) return null;
  if(Date.now()<s.resetAt) return s;
  const nr={...rl};delete nr[api];setRLS(nr);return null;
}
function markRL(api){
  const cfg={yahoo:{ms:120000},finnhub:{ms:61000},twelve:{ms:86400000},alpha:{ms:86400000}}[api]||{ms:60000};
  const rl=getRLS();
  rl[api]={resetAt:Date.now()+cfg.ms,limitedAt:Date.now()};
  setRLS(rl);return rl[api];
}
function fmtReset(ts,lang){
  var l=T[lang||'ko'];
  if(!ts) return l.shortly;
  const d=ts-Date.now();
  if(d<=0) return l.justNow;
  const s=Math.ceil(d/1000),m=Math.ceil(s/60),h=Math.ceil(m/60);
  if(s<60) return l.sec(s);
  if(m<60) return l.min(m);
  if(h<24) return l.hr(h);
  const dt=new Date(ts);
  return (dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
}

class RLError extends Error{constructor(api){super('rl');this.api=api}}
function fetchTO(url,ms=9000){
  return Promise.race([fetch(url),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms))]);
}

async function fetchYahoo(tickers){
  const sym=tickers.join(',');
  const target='https://query1.finance.yahoo.com/v7/finance/quote?symbols='+encodeURIComponent(sym)+'&fields=regularMarketPrice';
  const proxies=[
    'https://api.allorigins.win/raw?url='+encodeURIComponent(target),
    'https://corsproxy.io/?'+encodeURIComponent(target),
  ];
  for(const url of proxies){
    try{
      const res=await fetchTO(url);
      if(!res.ok) continue;
      const data=await res.json();
      const results=data&&data.quoteResponse&&data.quoteResponse.result;
      if(!Array.isArray(results)||results.length===0) continue;
      const out={};
      results.forEach(function(r){if(r.regularMarketPrice>0) out[r.symbol]=r.regularMarketPrice});
      if(Object.keys(out).length>0) return out;
    }catch(e){continue}
  }
  throw new Error('yahoo_unavailable');
}

async function fetchFinnhub(tickers,key){
  if(!key) throw new Error('no_key');
  const out={};
  for(let i=0;i<tickers.length;i++){
    const t=tickers[i];
    try{
      const res=await fetchTO('https://finnhub.io/api/v1/quote?symbol='+t+'&token='+key);
      if(res.status===429) throw new RLError('finnhub');
      const data=await res.json();
      if(data.error&&/limit/i.test(data.error)) throw new RLError('finnhub');
      if(data.c>0) out[t]=data.c;
    }catch(e){if(e instanceof RLError) throw e;}
    await new Promise(function(r){setTimeout(r,120)});
  }
  return out;
}

async function fetchTwelve(tickers,key){
  if(!key) throw new Error('no_key');
  const out={};
  const BATCH=8;
  for(let i=0;i<tickers.length;i+=BATCH){
    const batch=tickers.slice(i,i+BATCH);
    const res=await fetchTO('https://api.twelvedata.com/price?symbol='+encodeURIComponent(batch.join(','))+'&apikey='+key);
    const data=await res.json();
    if(data.code===429||data.status==='error') throw new RLError('twelve');
    if(batch.length===1){if(data.price) out[batch[0]]=parseFloat(data.price)}
    else batch.forEach(function(t){if(data[t]&&data[t].price) out[t]=parseFloat(data[t].price)});
    if(i+BATCH<tickers.length) await new Promise(function(r){setTimeout(r,500)});
  }
  return out;
}

async function fetchAlpha(tickers,key){
  if(!key) throw new Error('no_key');
  const out={};
  for(let i=0;i<Math.min(tickers.length,5);i++){
    const t=tickers[i];
    const res=await fetchTO('https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol='+t+'&apikey='+key);
    const data=await res.json();
    if(data.Note||data.Information) throw new RLError('alpha');
    const gq=data['Global Quote'];
    const p=gq&&parseFloat(gq['05. price']);
    if(p>0) out[t]=p;
    await new Promise(function(r){setTimeout(r,300)});
  }
  return out;
}

async function fetchAllPrices(positions,apiKeys,onStatus,lang){
  var l=T[lang||'ko'];
  const tickers=[...new Set(positions.map(function(p){return p.ticker}))];
  const usTickers=tickers.filter(function(t){return !isKR(t)});
  const prices={},msgs=[];

  // 1. Yahoo Finance
  const yrl=checkRL('yahoo');
  if(!yrl&&tickers.length>0){
    onStatus(l.fetchYahoo);
    try{
      const p=await fetchYahoo(tickers);
      Object.assign(prices,p);
      const n=Object.keys(p).length;
      msgs.push({type:'success',text:l.yahooOk(n),sub:null});
    }catch(e){
      const info=markRL('yahoo');
      msgs.push({type:'limit',text:l.yahooFail,sub:l.retryAt(fmtReset(info.resetAt,lang))});
    }
  }else if(yrl){
    msgs.push({type:'limit',text:l.yahooLimitTxt,sub:l.retryAt(fmtReset(yrl.resetAt,lang))});
  }

  // 2. Finnhub
  const miss1=usTickers.filter(function(t){return !prices[t]});
  const frl=checkRL('finnhub');
  if(miss1.length>0&&apiKeys.finnhub&&!frl){
    onStatus(l.fetchFinnhub);
    try{
      const p=await fetchFinnhub(miss1,apiKeys.finnhub);
      Object.assign(prices,p);
      const n=Object.keys(p).length;
      if(n>0) msgs.push({type:'success',text:l.finnhubOk(n),sub:null});
    }catch(e){
      if(e instanceof RLError){
        const info=markRL('finnhub');
        msgs.push({type:'limit',text:l.finnhubLimitTxt,sub:l.autoRetry(fmtReset(info.resetAt,lang))});
      }
    }
  }else if(frl&&apiKeys.finnhub&&miss1.length>0){
    msgs.push({type:'limit',text:l.finnhubWait,sub:'📅 '+fmtReset(frl.resetAt,lang)});
  }

  // 3. Twelve Data
  const miss2=usTickers.filter(function(t){return !prices[t]});
  const trl=checkRL('twelve');
  if(miss2.length>0&&apiKeys.twelve&&!trl){
    onStatus(l.fetchTwelve);
    try{
      const p=await fetchTwelve(miss2,apiKeys.twelve);
      Object.assign(prices,p);
      const n=Object.keys(p).length;
      if(n>0) msgs.push({type:'success',text:l.twelveOk(n),sub:null});
    }catch(e){
      if(e instanceof RLError){
        const info=markRL('twelve');
        msgs.push({type:'limit',text:l.twelveLimitTxt,sub:l.twelveLimitSub(fmtReset(info.resetAt,lang))});
      }
    }
  }else if(trl&&apiKeys.twelve&&miss2.length>0){
    msgs.push({type:'limit',text:l.twelveWait,sub:'📅 '+fmtReset(trl.resetAt,lang)});
  }

  // 4. Alpha Vantage
  const miss3=usTickers.filter(function(t){return !prices[t]});
  const arl=checkRL('alpha');
  if(miss3.length>0&&apiKeys.alpha&&!arl){
    onStatus(l.fetchAlpha);
    try{
      const p=await fetchAlpha(miss3,apiKeys.alpha);
      Object.assign(prices,p);
      const n=Object.keys(p).length;
      if(n>0) msgs.push({type:'success',text:l.alphaOk(n),sub:null});
    }catch(e){
      if(e instanceof RLError){
        const info=markRL('alpha');
        msgs.push({type:'limit',text:l.alphaLimitTxt,sub:l.alphaLimitSub(fmtReset(info.resetAt,lang))});
      }
    }
  }else if(arl&&apiKeys.alpha&&miss3.length>0){
    msgs.push({type:'limit',text:l.alphaWait,sub:'📅 '+fmtReset(arl.resetAt,lang)});
  }

  const stillMissing=tickers.filter(function(t){return !prices[t]});
  if(stillMissing.length>0&&tickers.length>0){
    msgs.push({type:'warn',text:l.missedTxt(stillMissing.length),sub:l.missedSub});
  }

  return{prices:prices,msgs:msgs};
}

function generateSalt(){var arr=new Uint8Array(16);crypto.getRandomValues(arr);return Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}
async function hashText(text){var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}
async function hashPassword(pw,salt){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),{name:'PBKDF2'},false,['deriveBits']);
  var bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:new TextEncoder().encode(salt),iterations:100000,hash:'SHA-256'},km,256);
  return Array.from(new Uint8Array(bits)).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}

// ── 포트폴리오 계산 ──
function calcPort(pos,prices,usdRate){
  var cost=0,val=0,div=0;
  var dbm=Array(12).fill(0);
  pos.forEach(function(p){
    var st=STOCKS.find(function(s){return s.t===p.ticker});
    var rate=st&&st.cur==='KRW'?(usdRate||1370):1;
    var cur=(prices[p.ticker]||p.buyPrice)/rate;
    var bp=p.buyPrice/rate;
    cost+=p.shares*bp; val+=p.shares*cur;
    var dy=p.divYield!==undefined?p.divYield:0;
    var ann=(p.shares*cur)*(dy/100); div+=ann;
    var isETF=st&&st.s==='ETF';
    for(var m=0;m<12;m++){
      if(isETF) dbm[m]+=ann/12;
      else if([2,5,8,11].indexOf(m)>=0) dbm[m]+=ann/4;
    }
  });
  return{cost:cost,val:val,gain:val-cost,gainPct:cost?(val-cost)/cost*100:0,div:div,dbm:dbm};
}

function calcComp(pos,prices,usdRate){
  var byT={};
  pos.forEach(function(p){
    var st=STOCKS.find(function(s){return s.t===p.ticker});
    var rate=st&&st.cur==='KRW'?(usdRate||1370):1;
    var cur=(prices[p.ticker]||p.buyPrice)/rate;
    var v=p.shares*cur;
    if(!byT[p.ticker]) byT[p.ticker]={ticker:p.ticker,name:p.name||p.ticker,val:0,div:0};
    byT[p.ticker].val+=v;
    byT[p.ticker].div+=v*((p.divYield||0)/100);
  });
  return Object.values(byT).sort(function(a,b){return b.val-a.val});
}

function calcSec(pos,prices,usdRate){
  var bs={};var tot=0;
  pos.forEach(function(p){
    var st=STOCKS.find(function(s){return s.t===p.ticker});
    var rate=st&&st.cur==='KRW'?(usdRate||1370):1;
    var cur=(prices[p.ticker]||p.buyPrice)/rate;
    var v=p.shares*cur;
    var sec=st?st.s:'Other';
    bs[sec]=(bs[sec]||0)+v; tot+=v;
  });
  return Object.entries(bs).map(function(e){return{s:e[0],v:e[1],pct:tot?e[1]/tot*100:0}}).sort(function(a,b){return b.v-a.v});
}

function Donut(props){

}

  function importCSV(file){
    var reader=new FileReader();
    reader.onload=function(e){
      var allLines=e.target.result.split('\n').filter(function(l){return l.trim()&&!l.trim().startsWith('#')});
      if(allLines.length===0){showImportError('파일이 비어 있거나 주석(#)만 포함되어 있습니다.');return;}
      var dataLines=allLines.slice(1);
      if(dataLines.length===0){showImportError('헤더 행만 있고 데이터가 없습니다.\n\n형식: ticker,name,account,shares,buyPrice,divYield');return;}
      var skipped=[];
      var newPos=dataLines.map(function(line,idx){
        var vals=line.split(',');
        var ticker=(vals[0]||'').trim().toUpperCase();
        var sharesRaw=(vals[3]||'').trim();
        var shares=parseFloat(sharesRaw)||0;
        if(!ticker) skipped.push((idx+2)+'행: 티커(ticker)가 비어 있음 → "'+line.trim()+'"');
        else if(!(shares>0)) skipped.push((idx+2)+'행: 수량(shares)이 0이거나 숫자가 아님 (값: "'+sharesRaw+'") → "'+line.trim()+'"');
        return {id:Date.now()+idx,ticker:ticker,
          name:(vals[1]||'').replace(/"/g,'').trim(),
          account:(vals[2]||accounts[0]||'').replace(/"/g,'').trim(),
          shares:shares,buyPrice:parseFloat(vals[4])||0,divYield:parseFloat(vals[5])||0};
      }).filter(function(p){return p.ticker&&p.shares>0});
      if(newPos.length===0){
        var msg='가져온 종목이 없습니다.\n\n필수 조건:\n  • ticker(종목코드) 필수\n  • shares(수량) > 0 필수\n\n예시:\nAAPL,애플,계좌명,10,150.00,0.5\n005930.KS,삼성전자,계좌명,5,72000,2.3';
        if(skipped.length>0) msg+='\n\n문제 행 ('+skipped.length+'건):\n'+skipped.join('\n');
        showImportError(msg);return;
      }
      var newAccounts=[];
      newPos.forEach(function(p){if(p.account&&!accounts.includes(p.account)&&!newAccounts.includes(p.account))newAccounts.push(p.account)});
      if(newAccounts.length>0) setAccounts(function(prev){return prev.concat(newAccounts)});
      setPositions(function(prev){return prev.concat(newPos)});
      var msg=newPos.length+'개 종목을 성공적으로 가져왔습니다.';
      if(newAccounts.length>0) msg+='\n\n새로 추가된 계좌 ('+newAccounts.length+'개):\n'+newAccounts.map(function(a){return '  + '+a}).join('\n');
      if(skipped.length>0) msg+='\n\n건너뛴 행 ('+skipped.length+'건):\n'+skipped.join('\n');
      showImportSuccess(msg);
    };
    reader.readAsText(file);
  }

  function handleLogin(){localStorage.setItem('pfm3_session','1');setIsLoggedIn(true)}
