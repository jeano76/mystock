<style>
:root {
  --bg:#07080c; --bg2:#0c0d12; --bg3:#131419; --bg4:#1a1b21; --bg5:#232429;
  --surface1:#161720; --surface2:#1c1d26;
  --border:#1e2028; --border2:#282a34;
  --text:#f0f1f5; --text2:#a4a7b4; --text3:#5e6170; --text4:#484b58;
  --green:#20e8a0; --green2:#14c282; --green3:rgba(32,232,160,.1);
  --red:#ff5070; --red3:rgba(255,80,112,.08);
  --blue:#5a9fff; --yellow:#ffba2e; --purple:#b091ff;
  --acc:#5a9fff; --acc2:#3a7de0; --acc3:rgba(90,159,255,.12);
  --mono:'DM Mono',monospace; --sans:'Sora',sans-serif;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.4);
  --shadow-sm:0 1px 3px rgba(0,0,0,.5),0 2px 10px rgba(0,0,0,.25);
  --shadow-md:0 4px 12px rgba(0,0,0,.5),0 8px 28px rgba(0,0,0,.35);
  --shadow-lg:0 8px 24px rgba(0,0,0,.6),0 16px 48px rgba(0,0,0,.4);
  --shadow-glow:0 0 20px rgba(90,159,255,.08);
  --shadow-inset:0 1px 0 rgba(255,255,255,.04) inset;
  --ease:cubic-bezier(.4,0,.2,1); --ease-out:cubic-bezier(0,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;overflow-x:hidden;max-width:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2c36;border-radius:6px}::-webkit-scrollbar-thumb:hover{background:#3a3c48}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .25s var(--ease),min-width .25s var(--ease)}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar.collapsed{width:44px;min-width:44px}
.sidebar.collapsed .sb-lbl,.sidebar.collapsed .sb-cnt,.sidebar.collapsed .sb-name span:not(.sb-dot),.sidebar.collapsed .sb-add-row,.sidebar.collapsed .sb-sec:not(:first-child){display:none}
.sidebar.collapsed .sb-item{justify-content:center;padding:6px}
.sidebar.collapsed .sb-name{font-size:14px}
.sb-actions{border-top:1px solid var(--border);padding:8px 6px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;flex-shrink:0;background:var(--bg2)}
.sidebar.collapsed .sb-actions{flex-direction:column;align-items:center;padding:6px 4px;overflow-y:auto;max-height:calc(100vh - 50px)}
.sb-action-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 5px;border-radius:7px;cursor:pointer;border:none;background:transparent;color:var(--text3);font-size:16px;line-height:1;transition:background .12s,color .12s;min-width:36px}
.sb-action-btn:hover{background:var(--bg3);color:var(--text)}
.sb-action-lbl{font-size:8px;color:var(--text3);white-space:nowrap;font-family:var(--sans)}
.sidebar.collapsed .sb-action-lbl{display:none}
.sb-action-btn.sb-logout{color:var(--text4)}
.sb-action-btn.sb-logout:hover{color:var(--red);background:rgba(255,77,114,.08)}
.sb-toggle{cursor:pointer;font-size:11px;color:var(--text3);padding:2px 5px;border-radius:4px;line-height:1;flex-shrink:0}
.sb-toggle:hover{background:var(--bg4);color:var(--text)}
.sb-logo-row{display:flex;align-items:center;justify-content:space-between}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 18px;height:52px;display:flex;align-items:center;justify-content:flex-end;flex-shrink:0;position:sticky;top:0;z-index:50;gap:6px;overflow:hidden}
.logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.06em}
.logo em{color:var(--acc);font-style:normal}
.topbar-right{display:flex;gap:5px;align-items:center;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;width:100%;min-width:0;justify-content:flex-end}
.topbar-right::-webkit-scrollbar{display:none}
/* PAGE HEADER */
.page-hdr{display:flex;align-items:flex-end;justify-content:space-between;padding:16px 18px 14px;flex-shrink:0;border-bottom:none}
.page-hdr-left{display:flex;flex-direction:column;gap:4px}
.page-hdr-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.03em}
.page-hdr-sub{font-size:10px;color:var(--text4);font-family:var(--mono);letter-spacing:.02em}
.page-hdr-acc{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--acc);font-family:var(--mono);background:var(--acc3);border:1px solid rgba(90,159,255,.2);border-radius:6px;padding:2px 8px;margin-top:3px;width:fit-content}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:linear-gradient(180deg,var(--bg5),var(--bg4));color:var(--text);cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:600;transition:all .18s var(--ease);white-space:nowrap;box-shadow:var(--shadow-inset),var(--shadow-xs);letter-spacing:.01em}
.btn:hover:not(:disabled){background:linear-gradient(180deg,#2a2b32,var(--bg5));border-color:#3a3c48;box-shadow:var(--shadow-inset),var(--shadow-sm);transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(0);box-shadow:0 1px 0 rgba(0,0,0,.6) inset}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(180deg,#6aa8ff,var(--acc2));border-color:var(--acc2);color:#fff;font-weight:700;box-shadow:var(--shadow-inset),0 2px 12px rgba(90,159,255,.3)}
.btn-primary:hover:not(:disabled){background:linear-gradient(180deg,#7cb4ff,var(--acc));box-shadow:var(--shadow-inset),0 4px 20px rgba(90,159,255,.4);transform:translateY(-1px)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text3);box-shadow:none}
.btn-ghost:hover{background:rgba(255,255,255,.04);color:var(--text);border-color:var(--border2);box-shadow:none;transform:none}
.sb-sec{padding:10px 0;border-bottom:1px solid var(--border)}
.sb-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:0 14px 6px}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .15s var(--ease)}
.sb-item:hover{background:rgba(255,255,255,.035)}
.sb-item.active{background:var(--acc3);border-left-color:var(--acc)}
.sb-name{font-size:11px;color:var(--text2);font-weight:500;display:flex;align-items:center;gap:6px}
.sb-item.active .sb-name{color:var(--text);font-weight:600}
.sb-cnt{font-family:var(--mono);font-size:9px;color:var(--text4);background:rgba(255,255,255,.05);padding:1px 6px;border-radius:10px}
.sb-item.active .sb-cnt{background:var(--acc3);color:var(--acc)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-add-row{padding:8px 10px 8px 14px;display:flex;gap:6px;box-sizing:border-box;width:100%}
.sb-add-row input{flex:1;min-width:0;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:5px;font-size:11px;font-family:var(--sans);outline:none;box-sizing:border-box}
.sb-add-row .btn{flex-shrink:0}
.sb-add-row input:focus{border-color:var(--acc)}
.content{padding:14px 18px;flex:1}
.hero{background:linear-gradient(145deg,var(--surface1) 0%,var(--bg3) 50%,var(--surface1) 100%);border:1px solid var(--border2);border-radius:var(--radius-md);padding:20px 22px;margin:0 14px 14px;position:relative;overflow:hidden;box-shadow:var(--shadow-md),var(--shadow-glow)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% -15%,rgba(90,159,255,.1) 0%,transparent 50%),radial-gradient(ellipse at 0% 110%,rgba(32,232,160,.05) 0%,transparent 40%);pointer-events:none}
.hero::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(90,159,255,.45) 35%,rgba(32,232,160,.45) 70%,transparent)}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.hero-lbl{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px;font-weight:600}
.hero-val{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--text);letter-spacing:-.02em}
.hero-gain{font-family:var(--mono);font-size:13px;font-weight:600;margin-top:4px;letter-spacing:.01em}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.hstat{background:linear-gradient(145deg,var(--bg3),var(--bg4));border:1px solid var(--border);border-radius:10px;padding:11px 13px;box-shadow:var(--shadow-sm),var(--shadow-inset);transition:border-color .2s var(--ease),box-shadow .2s var(--ease)}
.hstat:hover{border-color:rgba(90,159,255,.25);box-shadow:var(--shadow-sm),0 0 0 1px rgba(90,159,255,.08)}
.hstat-lbl{font-size:8px;color:var(--text4);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px;font-weight:700}
.hstat-val{font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:-.01em}
.hstat-sub{font-size:9px;color:var(--text4);margin-top:3px;font-family:var(--mono)}
.tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin:0 14px 14px;gap:2px;box-shadow:var(--shadow-sm)}
.tab{flex:1;text-align:center;padding:7px 10px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .18s var(--ease);position:relative}
.tab:hover:not(.active){color:var(--text2);background:rgba(255,255,255,.03)}
.tab.active{background:linear-gradient(145deg,var(--bg5),var(--bg4));color:var(--text);font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,.5),var(--shadow-inset)}
.tab.active::after{content:'';position:absolute;bottom:3px;left:28%;right:28%;height:2px;background:var(--acc);border-radius:2px;opacity:.7}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow-sm);transition:border-color .2s var(--ease),box-shadow .2s var(--ease)}
.chart-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md)}
.chart-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.chart-sub{font-size:9px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0}
.donut-wrap{display:flex;gap:12px;align-items:center}
.donut-canvas-wrap{position:relative;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center-val{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text)}
.donut-center-lbl{font-size:8px;color:var(--text3);margin-top:1px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:3px;overflow:auto;max-height:160px}
.legend-item{display:flex;align-items:center;gap:5px;padding:2px 3px;border-radius:3px}
.legend-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.legend-name{font-size:9px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend-pct{font-family:var(--mono);font-size:9px;color:var(--text3)}
.comp-stabs{display:flex;gap:5px;margin-bottom:8px}
.comp-stab{padding:3px 8px;border-radius:5px;font-size:9px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--text3);background:transparent;transition:all .15s}
.comp-stab.active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.bar-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);transition:border-color .2s,box-shadow .2s}
.bar-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md)}
.bar-months{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;align-items:end;height:90px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.bar-amt{font-family:var(--mono);font-size:7px;color:var(--text3);text-align:center;white-space:nowrap;height:12px;display:flex;align-items:flex-end;justify-content:center}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:all .2s;position:relative}
.bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);border-radius:3px 3px 0 0}
.bar-fill.cur{background:var(--yellow)!important}
.bar-fill.gb{background:linear-gradient(180deg,var(--green),var(--green2))}
.bar-fill.empty-b{background:var(--bg4);opacity:.4}
.bar-lbl{font-size:7px;color:var(--text3);font-family:var(--mono)}
.sector-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow-sm);transition:border-color .2s,box-shadow .2s}
.sector-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md)}
.sector-bar{height:9px;border-radius:5px;display:flex;overflow:hidden;margin:8px 0}
.sec-seg{height:100%;transition:flex .4s}
.sec-legend{display:flex;flex-wrap:wrap;gap:7px}
.sec-leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
.sec-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border2);color:var(--text3);background:transparent;transition:all .18s var(--ease)}
.pill.active{background:var(--acc3);border-color:rgba(90,159,255,.35);color:var(--acc)}
.pill:hover:not(.active){background:rgba(255,255,255,.04);color:var(--text2)}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);overflow-x:auto;overflow-y:hidden;box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);white-space:nowrap}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .12s var(--ease)}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
tbody tr:hover{background:rgba(90,159,255,.04) !important}
td{padding:8px 12px;font-size:11px;white-space:nowrap;font-variant-numeric:tabular-nums}
td.r{text-align:right}
.ticker-cell{display:flex;align-items:center;gap:6px}
.t-badge{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text);background:var(--bg4);padding:2px 5px;border-radius:4px;border:1px solid var(--border2)}
.t-badge.kr{border-color:rgba(255,184,0,.35);color:var(--yellow)}
.t-name{font-size:9px;color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis}
.num{font-family:var(--mono)}
.g{color:var(--green)}.r2{color:var(--red)}.dim{color:var(--text3)}
.acc-badge{font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(61,142,248,.1);color:var(--acc);border:1px solid rgba(61,142,248,.2)}
.cell-editable{cursor:text;border-radius:3px;padding:1px 3px;transition:background .1s}
.cell-editable:hover{background:var(--bg4);outline:1px dashed var(--border2)}
.cell-input{background:var(--bg3);border:1px solid var(--acc);color:var(--text);border-radius:4px;padding:2px 5px;font-size:11px;font-family:var(--mono);outline:none;min-width:50px}
.cell-input:focus{box-shadow:0 0 0 2px rgba(61,142,248,.2)}
.kr-badge{font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(255,184,0,.1);color:var(--yellow);border:1px solid rgba(255,184,0,.2);margin-left:3px}
.grp-row{background:var(--bg3)}
.grp-row td{padding:5px 10px;font-size:10px;font-weight:600;color:var(--text2)}
.grp-info{font-weight:400;color:var(--text3);font-family:var(--mono);font-size:9px;margin-left:8px}
.empty{text-align:center;padding:36px;color:var(--text3)}
.empty-icon{font-size:26px;margin-bottom:7px;opacity:.4}
.overlay{position:fixed;inset:0;background:rgba(4,5,10,.82);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px) saturate(120%);-webkit-backdrop-filter:blur(12px) saturate(120%)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:460px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg),0 0 0 1px rgba(255,255,255,.03) inset}
.modal-hd{padding:16px 18px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}
.modal-title{font-size:14px;font-weight:700;letter-spacing:-.01em}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:11px}
.modal-ft{padding:11px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.field input,.field select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:var(--radius-sm);font-size:12px;font-family:var(--sans);outline:none;width:100%;transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
.field input:focus,.field select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(90,159,255,.12)}
.field select option{background:var(--bg3)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.close-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 5px;border-radius:4px}
.close-x:hover{background:var(--bg4);color:var(--text)}
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--acc);border-top:none;border-radius:0 0 6px 6px;z-index:60;max-height:200px;overflow-y:auto}
.ac-item{padding:7px 9px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.ac-item:hover,.ac-item.sel{background:var(--bg4)}
.ac-t{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text);min-width:64px}
.ac-n{font-size:10px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-sec{font-size:9px;color:var(--text3)}
.ac-d{font-size:9px;color:var(--green);font-family:var(--mono)}
.info-chip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:10px;color:var(--text2);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.chip-t{background:rgba(61,142,248,.12);color:var(--acc);font-size:9px;padding:2px 5px;border-radius:3px}
.chip-g{background:rgba(23,232,161,.12);color:var(--green);font-size:9px;padding:2px 5px;border-radius:3px}
.chip-kr{background:rgba(255,184,0,.12);color:var(--yellow);font-size:9px;padding:2px 5px;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .9s linear infinite;display:inline-block}
/* TOAST */
.toast-ctr{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px;max-width:360px;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;pointer-events:all;animation:toastIn .25s var(--ease-out);box-shadow:var(--shadow-lg)}
.toast-success{border-left:3px solid var(--green)}
.toast-limit{border-left:3px solid var(--yellow)}
.toast-warn{border-left:3px solid var(--yellow)}
.toast-error{border-left:3px solid var(--red)}
.toast-info{border-left:3px solid var(--acc)}
.toast-icon{font-size:14px;margin-top:1px;flex-shrink:0}
.toast-body{flex:1;min-width:0}
.toast-msg{font-size:11px;color:var(--text);line-height:1.4}
.toast-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono);line-height:1.4}
.toast-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;line-height:1}
.toast-x:hover{color:var(--text)}
@keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
/* API STATUS */
.api-status{display:flex;gap:5px;align-items:center;padding:4px 8px;border-radius:5px;background:var(--bg3);border:1px solid var(--border)}
.api-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default}
.api-dot{width:6px;height:6px;border-radius:50%}
.api-dot-lbl{font-size:7px;font-family:var(--mono);color:var(--text4)}
/* SETTINGS */
.settings-modal{width:520px}
.api-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;display:flex;flex-direction:column;gap:7px}
.api-item-head{display:flex;align-items:center;justify-content:space-between}
.api-item-name{font-size:11px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
.api-item-link{font-size:9px;color:var(--acc);text-decoration:none;opacity:0.7;line-height:1}
.api-item-link:hover{opacity:1}
.api-item-desc{font-size:9px;color:var(--text3);margin-top:2px}
.api-item-status{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:4px;flex-shrink:0}
.api-ok{background:var(--green3);color:var(--green)}
.api-limited{background:rgba(255,184,0,.12);color:var(--yellow)}
.api-nokey{background:var(--bg4);color:var(--text3)}
.api-note{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 11px;font-size:10px;color:var(--text2);line-height:1.7}
.refresh-status{font-size:10px;color:var(--text3);font-family:var(--mono);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* AUTH */
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px 32px;width:400px;display:flex;flex-direction:column;gap:18px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.auth-logo{font-family:var(--mono);font-size:18px;font-weight:500;text-align:center;letter-spacing:.06em;margin-bottom:4px}
.auth-logo em{color:var(--acc);font-style:normal}
.auth-title{font-size:17px;font-weight:600;text-align:center;color:var(--text)}
.auth-sub{font-size:11px;color:var(--text3);text-align:center;line-height:1.7}
.auth-err{background:rgba(255,77,114,.1);border:1px solid rgba(255,77,114,.3);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--red);text-align:center;line-height:1.5}
.auth-warn{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.3);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--yellow);line-height:1.6}
.auth-link{font-size:10px;color:var(--text3);cursor:pointer;text-align:center;margin-top:4px}
.auth-link:hover{color:var(--acc)}
/* BOARD */
.board-view{display:flex;flex-direction:column;gap:0;padding:0;height:100%}
.board-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 160px)}
.board-ticker-list{width:160px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
.board-ticker-item{padding:7px 14px;font-size:11px;cursor:pointer;color:var(--text2);border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.board-ticker-item:hover{background:var(--bg3);color:var(--text)}
.board-ticker-item.active{background:var(--bg3);border-left-color:var(--acc);color:var(--text);font-weight:600}
.board-ticker-cnt{float:right;font-size:9px;color:var(--text3);font-family:var(--mono)}
.board-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.board-compose{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.board-compose-row{display:flex;gap:8px;align-items:flex-end}
.board-textarea{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--text);resize:none;font-family:var(--sans);line-height:1.5;outline:none}
.board-textarea:focus{border-color:var(--acc)}
.board-compose-meta{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.board-author-input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;font-size:11px;color:var(--text);outline:none;width:130px}
.board-author-input:focus{border-color:var(--acc)}
.board-ticker-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;font-size:11px;color:var(--text);outline:none;cursor:pointer}
.board-char-cnt{font-size:10px;color:var(--text3);font-family:var(--mono);margin-left:auto}
.board-posts{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.board-post{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.board-post-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.board-post-author{font-size:11px;font-weight:700;color:var(--text)}
.board-post-ticker{font-size:10px;background:rgba(0,210,120,.12);color:var(--acc);border-radius:4px;padding:1px 6px;font-family:var(--mono);font-weight:600}
.board-post-time{font-size:10px;color:var(--text3);margin-left:auto}
.board-post-text{font-size:12px;color:var(--text2);line-height:1.65;word-break:break-word}
.board-post-foot{display:flex;align-items:center;gap:8px;margin-top:8px}
.board-post-like{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;transition:all .12s}
.board-post-like:hover,.board-post-like.liked{background:rgba(0,210,120,.1);border-color:var(--acc);color:var(--acc)}
.board-post-del{font-size:10px;color:var(--text4);cursor:pointer;margin-left:auto;padding:2px 6px;border-radius:4px;border:1px solid transparent}
.board-post-del:hover{border-color:var(--red);color:var(--red)}
.board-empty{text-align:center;color:var(--text3);font-size:12px;padding:40px 20px;line-height:1.8}
.board-nobinbox{background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.3);border-radius:10px;padding:16px 18px;margin:16px;font-size:12px;color:var(--text2);line-height:1.7}
.board-share-box{background:var(--bg3);border-radius:6px;padding:6px 10px;font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:6px;word-break:break-all}
.board-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.board-header-title{font-size:13px;font-weight:700;color:var(--text)}
.board-status{font-size:10px;color:var(--text3)}
/* LANDING PAGE */
.landing-overlay{position:fixed;inset:0;z-index:1000;display:grid;grid-template-columns:1fr 420px;background:var(--bg);overflow:hidden}
.landing-left{display:flex;flex-direction:column;justify-content:center;padding:64px 72px;background:radial-gradient(ellipse at 30% 40%,rgba(0,210,120,.06) 0%,transparent 60%);overflow-y:auto}
.landing-right{background:var(--bg2);border-left:1px solid var(--border2);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 36px;overflow-y:auto}
.landing-logo{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:.08em;margin-bottom:48px;display:flex;align-items:center;gap:10px}
.landing-logo em{color:var(--acc);font-style:normal;font-size:26px}
.landing-logo-badge{font-size:10px;background:rgba(0,210,120,.15);color:var(--acc);border:1px solid rgba(0,210,120,.3);border-radius:4px;padding:2px 7px;font-weight:500;letter-spacing:.04em;align-self:center}
.landing-headline{font-size:34px;font-weight:800;line-height:1.25;margin-bottom:14px;color:var(--text)}
.landing-headline em{font-style:normal;color:var(--acc)}
.landing-sub{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:44px;max-width:500px}
.landing-features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:44px;max-width:580px}
.landing-feat{display:flex;align-items:flex-start;gap:12px;padding:18px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--radius-md);transition:all .22s var(--ease);box-shadow:var(--shadow-xs)}
.landing-feat:hover{border-color:rgba(90,159,255,.3);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.landing-feat-icon{font-size:22px;flex-shrink:0;line-height:1;margin-top:1px}
.landing-feat-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:.01em}
.landing-feat-desc{font-size:10.5px;color:var(--text3);line-height:1.55}
.landing-stats{display:flex;gap:36px;padding-top:22px;border-top:1px solid var(--border)}
.landing-stat{display:flex;flex-direction:column;gap:3px}
.landing-stat-val{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--acc)}
.landing-stat-lbl{font-size:10px;color:var(--text3);letter-spacing:.02em}
.landing-form-wrap{width:100%;max-width:340px;display:flex;flex-direction:column;gap:0}
.landing-form-header{margin-bottom:24px;text-align:center}
.landing-form-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.landing-form-sub{font-size:11px;color:var(--text3);line-height:1.6}
.landing-tab-row{display:flex;gap:0;margin-bottom:22px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.landing-tab{flex:1;padding:8px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;background:transparent;color:var(--text3);border:none;transition:all .15s}
.landing-tab.active{background:var(--acc);color:#000}
.landing-form-fields{display:flex;flex-direction:column;gap:12px}
.landing-field label{display:block;font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:500;letter-spacing:.03em}
.landing-field input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--text);outline:none;transition:border-color .15s;box-sizing:border-box}
.landing-field input:focus{border-color:var(--acc)}
.landing-form-err{background:rgba(255,77,114,.1);border:1px solid rgba(255,77,114,.3);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--red);text-align:center;line-height:1.5;margin-bottom:4px}
.landing-form-warn{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.3);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--yellow);line-height:1.6;margin-bottom:4px}
.landing-form-btn{width:100%;padding:11px;font-size:13px;font-weight:700;letter-spacing:.02em;margin-top:4px;border-radius:8px}
.landing-form-hint{font-size:10px;color:var(--text3);text-align:center;cursor:pointer;margin-top:8px;line-height:1.5}
.landing-form-hint:hover{color:var(--acc)}
.landing-form-sec-note{font-size:9.5px;color:var(--text4);text-align:center;line-height:1.6;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.landing-lang-row{display:flex;justify-content:flex-end;margin-bottom:24px;width:100%;max-width:340px}
@media(max-width:860px){.landing-overlay{grid-template-columns:1fr}.landing-left{display:none}.landing-right{padding:32px 24px}}
/* SHARE MODAL */
.share-modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;padding:16px}
.share-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:16px}
.share-modal-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.share-close{cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;border:none;background:transparent}
.share-close:hover{color:var(--text);background:var(--bg3)}
.share-sns-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.share-sns-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:10px;font-weight:600;transition:all .15s;letter-spacing:.02em}
.share-sns-btn:hover{border-color:var(--acc);color:var(--text);background:var(--bg4)}
.share-sns-icon{font-size:22px;line-height:1}
.share-url-row{display:flex;gap:6px;align-items:center}
.share-url-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text2);font-size:11px;font-family:var(--mono);outline:none}
.share-url-copy{flex-shrink:0}
.share-cap-area{background:var(--bg3);border:1px dashed var(--border2);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:8px}
.share-cap-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.share-cap-btn{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);font-size:11px;font-weight:600;transition:all .15s;width:100%;justify-content:center}
.share-cap-btn:hover{border-color:var(--acc);color:var(--acc)}
.share-cap-btn:disabled{opacity:.5;cursor:not-allowed}
.share-cap-preview{border-radius:6px;overflow:hidden;max-height:160px;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.share-cap-preview img{width:100%;height:auto;border-radius:6px;display:block}
.share-divider{border:none;border-top:1px solid var(--border);margin:0}
/* REGION FILTER */
.region-filter{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg3)}
.region-btn{padding:5px 13px;font-size:11px;font-weight:600;background:transparent;border:none;border-right:1px solid var(--border);color:var(--text3);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap;font-family:var(--sans);line-height:1.4}
.region-btn:last-child{border-right:none}
.region-btn:hover:not(.active){color:var(--text2);background:var(--bg4)}
.region-btn.active{background:var(--bg4);color:var(--text);font-weight:700}
.region-btn.active.rf-us{color:var(--blue);background:rgba(77,158,255,.1)}
.region-btn.active.rf-kr{color:#a78bfa;background:rgba(167,139,250,.1)}
/* COOKIE CONSENT */
.cookie-banner{position:fixed;bottom:0;left:0;right:0;background:var(--bg3);border-top:1px solid var(--border2);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;z-index:900;flex-wrap:wrap}
.cookie-text{font-size:11px;color:var(--text2);line-height:1.6;flex:1;min-width:200px}
.cookie-text a{color:var(--acc);cursor:pointer;text-decoration:underline}
.cookie-btns{display:flex;gap:8px;flex-shrink:0}
/* FOOTER */
.site-footer{background:var(--bg2);border-top:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0}
.footer-links{display:flex;gap:16px;flex-wrap:wrap}
.footer-link{font-size:10px;color:var(--text3);cursor:pointer;text-decoration:none}
.footer-link:hover{color:var(--acc)}
.footer-copy{font-size:10px;color:var(--text4);font-family:var(--mono)}
/* LEGAL MODAL */
.legal-modal{width:600px;max-height:80vh}
.legal-body{padding:20px 24px;font-size:11px;color:var(--text2);line-height:1.9;overflow-y:auto;max-height:60vh}
.legal-body h3{font-size:12px;font-weight:600;color:var(--text);margin:16px 0 6px}
.legal-body h3:first-child{margin-top:0}
.legal-body p{margin-bottom:8px}
.legal-body ul{padding-left:18px;margin-bottom:8px}
.legal-body ul li{margin-bottom:4px}
/* LANG */
.lang-btn{font-size:9px;color:var(--text3);cursor:pointer;padding:2px 8px;border:1px solid var(--border2);border-radius:4px;background:transparent;font-family:var(--mono);letter-spacing:.04em;line-height:1.6}
.lang-btn:hover{color:var(--text);border-color:var(--acc);background:var(--bg4)}
.auth-lang{text-align:center;margin-top:-8px}
/* FILTER MODAL */
.filter-modal-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px;max-height:360px;overflow-y:auto}
.filter-item{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px}
.filter-item-name{flex:1;background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:4px 7px;border-radius:5px;font-size:11px;font-family:var(--sans);outline:none}
.filter-item-name:focus{border-color:var(--acc)}
.filter-type-badge{font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--text3);font-family:var(--mono);flex-shrink:0}
.filter-add-row{display:flex;gap:7px;align-items:center;padding:10px 0 0;border-top:1px solid var(--border);flex-wrap:wrap}
.filter-add-row input{flex:1;min-width:90px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 8px;border-radius:5px;font-size:11px;font-family:var(--sans);outline:none}
.filter-add-row input:focus{border-color:var(--acc)}
.filter-add-row select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 7px;border-radius:5px;font-size:11px;font-family:var(--sans);outline:none}
.filter-add-row select:focus{border-color:var(--acc)}
/* ACCOUNT RENAME */
.acc-rename-input{background:var(--bg4);border:1px solid var(--acc);color:var(--text);padding:2px 6px;border-radius:4px;font-size:11px;font-family:var(--sans);outline:none;width:90px}
/* SORT */
thead th.sortable{cursor:pointer;user-select:none;transition:color .1s}
thead th.sortable:hover{color:var(--text)}
thead th.sort-asc::after{content:' ▲';color:var(--acc);font-size:7px}
thead th.sort-desc::after{content:' ▼';color:var(--acc);font-size:7px}
/* SEARCH */
.search-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.search-input{flex:1;max-width:220px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:6px;font-size:11px;font-family:var(--sans);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--acc)}
.search-input::placeholder{color:var(--text3)}
/* UNDO BAR */
.undo-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:9px 18px;display:flex;align-items:center;gap:14px;z-index:300;font-size:11px;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:fadeInUp .2s ease}
.undo-btn{color:var(--acc);cursor:pointer;font-weight:600;font-size:11px;background:none;border:none;padding:0;font-family:var(--sans)}
.undo-btn:hover{text-decoration:underline}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* IO MODAL */
.io-section{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:6px}
.io-section h4{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px}
.io-section p{font-size:10px;color:var(--text3)}
.io-btns{display:flex;gap:7px;flex-wrap:wrap}
/* HEATMAP */
.heat-cell{border-radius:3px;padding:1px 3px}
/* REBALANCE */
.rebal-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.rebal-row:last-child{border-bottom:none}
.rebal-name{font-size:10px;color:var(--text2);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rebal-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.rebal-bar-wrap{position:relative;background:var(--bg4);border-radius:3px;height:6px;overflow:visible}
.rebal-bar-actual{height:100%;border-radius:3px;transition:width .5s}
.rebal-target-line{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--yellow);border-radius:1px;z-index:2}
.rebal-nums{font-family:var(--mono);font-size:9px;display:flex;gap:6px}
.rebal-input{background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:2px 4px;border-radius:4px;font-size:9px;font-family:var(--mono);width:38px;outline:none;text-align:center}
.rebal-input:focus{border-color:var(--acc)}
/* SNAPSHOT */
.snapshot-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);transition:border-color .2s,box-shadow .2s}
.snapshot-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md)}
.snap-chart-wrap{height:140px;margin-top:8px}
/* LIGHT THEME */
html.light{--bg:#fafbfc;--bg2:#f2f3f5;--bg3:#e9eaee;--bg4:#dfe0e5;--bg5:#d3d4da;--surface1:#f0f0f3;--surface2:#e6e7eb;--border:#d4d5dc;--border2:#c0c1ca;--text:#111218;--text2:#3c3e48;--text3:#7a7c88;--text4:#9698a4;--green:#0aaf78;--green2:#089060;--green3:rgba(10,175,120,.1);--red:#e02050;--red3:rgba(224,32,80,.08);--acc:#2563eb;--acc2:#1d4ed8;--acc3:rgba(37,99,235,.08);--shadow-xs:0 1px 2px rgba(0,0,0,.06);--shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 6px rgba(0,0,0,.04);--shadow-md:0 2px 8px rgba(0,0,0,.1),0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 4px 16px rgba(0,0,0,.12),0 8px 32px rgba(0,0,0,.08);--shadow-glow:none;--shadow-inset:0 1px 0 rgba(255,255,255,.5) inset}
/* AUTO-REFRESH */
.ar-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:10px;padding:2px 5px;border-radius:4px;font-family:var(--sans);cursor:pointer;outline:none}
.ar-cd{font-family:var(--mono);font-size:9px;color:var(--text3);min-width:28px;text-align:right;white-space:nowrap}
/* NOTE */
.note-icon{font-size:10px;cursor:pointer;color:var(--text3);padding:1px 3px;border-radius:3px;line-height:1}
.note-icon:hover{background:var(--bg4)}
.note-icon.has-note{color:var(--acc)}
.note-wrap{position:relative;display:inline-flex;align-items:center}
.note-tooltip{position:absolute;z-index:200;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--text2);max-width:180px;white-space:pre-wrap;box-shadow:0 4px 12px rgba(0,0,0,.3);left:0;top:100%;margin-top:4px;pointer-events:none}
/* DRAG */
.drag-handle{cursor:grab;color:var(--text4);font-size:13px;padding:0 4px;user-select:none;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
tr.dragging{opacity:.35}
/* COLUMN VISIBILITY */
.col-vis-wrap{position:relative}
.col-vis-drop{position:absolute;right:0;top:calc(100% + 4px);background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px;z-index:60;min-width:155px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.col-vis-item{display:flex;align-items:center;gap:7px;padding:4px 5px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--text2)}
.col-vis-item:hover{background:var(--bg4)}
.col-vis-item input[type=checkbox]{cursor:pointer;accent-color:var(--acc);width:13px;height:13px}
/* BEP */
.bep-val{font-family:var(--mono);font-size:10px;color:var(--text3)}
.bep-tgt{font-family:var(--mono);font-size:9px;color:var(--acc);margin-top:1px}
/* TREEMAP */
.treemap-wrap{width:100%;height:200px;position:relative;border-radius:8px;overflow:hidden;cursor:default}
/* DIVIDEND CALENDAR */
.div-cal{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.div-cal-summary{font-size:9px;color:var(--text3);padding:0 2px}
.div-cal-bars{display:flex;align-items:stretch;gap:3px;height:150px;padding:0 2px;overflow-x:auto}
.div-cal-bar-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:calc((100% - 72px) / 24);min-width:18px;max-width:36px;gap:1px}
.div-cal-bar-wrap.cur-month .div-cal-bar-stack{outline:1.5px solid var(--text2);outline-offset:1px}
.div-cal-bar-stack{width:100%;flex:1;display:flex;flex-direction:column;border-radius:3px 3px 0 0;overflow:hidden;cursor:default;min-height:0}
.div-cal-seg{width:100%;transition:opacity .15s;flex-shrink:0}
.div-cal-seg:hover{opacity:.75}
.div-cal-bar-tick{font-size:7px;font-weight:500;color:var(--text3);text-align:center;line-height:1.2;flex-shrink:0}
.div-cal-bar-year{font-size:6px;color:var(--text4);text-align:center;line-height:1;flex-shrink:0}
.div-cal-legend{display:flex;gap:10px;flex-wrap:wrap;padding:0 2px}
.div-cal-leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text3)}
.div-cal-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
/* REPORT */
.report-view{display:flex;flex-direction:column;gap:14px;padding:18px}
.report-hd{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.report-hd-title{font-size:15px;font-weight:700;color:var(--text)}
.report-hd-meta{font-size:10px;color:var(--text3)}
.report-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--shadow-sm)}
.report-sec-hd{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);padding-bottom:8px}
.report-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.report-stat{background:linear-gradient(145deg,var(--bg3),var(--bg4));border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow-xs)}
.report-stat-lbl{font-size:9px;color:var(--text3);margin-bottom:4px}
.report-stat-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text)}
.report-stat-sub{font-size:9px;color:var(--text3);margin-top:2px}
.report-tbl{width:100%;border-collapse:collapse;font-size:11px}
.report-tbl th{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:5px 8px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.report-tbl th:first-child,.report-tbl th:nth-child(2),.report-tbl th:nth-child(3){text-align:left}
.report-tbl td{padding:5px 8px;border-bottom:1px solid rgba(128,128,128,0.07);text-align:right;font-family:var(--mono);color:var(--text2);font-size:11px}
.report-tbl td:first-child{text-align:left;color:var(--text);font-family:inherit;font-weight:500}
.report-tbl td:nth-child(2){text-align:left;font-family:inherit}
.report-tbl td:nth-child(3){text-align:left;font-family:inherit}
.report-tbl .pos{color:var(--green)}.report-tbl .neg{color:var(--red)}
.tax-split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tax-box{background:var(--bg3);border-radius:8px;padding:12px 14px;border-left:3px solid var(--border)}
.tax-box-us{border-left-color:#5b9bd5}.tax-box-kr{border-left-color:#17e8a1}
.tax-box-hd{font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px}
.tax-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.tax-lbl{font-size:10px;color:var(--text3);flex:1}
.tax-val{font-family:var(--mono);font-size:10px;color:var(--text2);text-align:right}
.tax-note{font-size:8px;color:var(--text4);margin-top:2px}
.tax-summary-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;padding-top:8px;border-top:1px solid var(--border)}
.tax-summary-item{display:flex;flex-direction:column;gap:2px}
.tax-summary-lbl{font-size:9px;color:var(--text3)}
.tax-summary-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.tax-summary-val.pos{color:var(--green)}
.report-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.report-bar-lbl{font-size:10px;color:var(--text2);width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.report-bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.report-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.report-bar-pct{font-family:var(--mono);font-size:10px;color:var(--text3);width:36px;text-align:right;flex-shrink:0}
.report-two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fx-scenario-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
.fx-scenario{background:var(--bg3);border-radius:6px;padding:8px 10px;text-align:center}
.fx-scenario-rate{font-size:9px;color:var(--text3);margin-bottom:3px}
.fx-scenario-val{font-family:var(--mono);font-size:12px;font-weight:600}
.health-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.health-item{background:var(--bg3);border-radius:6px;padding:10px 12px}
.health-item-lbl{font-size:9px;color:var(--text3);margin-bottom:4px}
.health-item-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text)}
.health-item-sub{font-size:9px;color:var(--text3);margin-top:2px}
.health-badge{display:inline-block;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.health-good{background:rgba(23,232,161,0.15);color:var(--green)}
.health-warn{background:rgba(240,165,0,0.15);color:#f0a500}
.health-bad{background:rgba(255,107,107,0.15);color:#ff6b6b}
@media(max-width:680px){.report-stat-grid{grid-template-columns:repeat(2,1fr)}.tax-split{grid-template-columns:1fr}.report-two-col{grid-template-columns:1fr}.fx-scenario-grid{grid-template-columns:repeat(2,1fr)}.health-grid{grid-template-columns:1fr}}
/* FORECAST */
.forecast-view{display:flex;flex-direction:column;gap:12px;padding:18px}
.forecast-controls{display:flex;gap:12px;flex-wrap:wrap;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;align-items:flex-end}
.forecast-ctrl{display:flex;flex-direction:column;gap:5px;flex:1;min-width:160px}
.forecast-ctrl-toggle{flex:0;min-width:120px}
.forecast-ctrl-lbl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.forecast-ctrl-row{display:flex;align-items:center;gap:8px}
.forecast-slider{flex:1;accent-color:var(--green);cursor:pointer}
.forecast-val{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:700;min-width:38px;text-align:right}
.forecast-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.forecast-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow-sm);transition:border-color .2s,box-shadow .2s}
.forecast-card:hover{box-shadow:var(--shadow-md)}
.forecast-card-y10{border-color:rgba(23,232,161,0.4)}
.forecast-card-y20{border-color:rgba(91,155,213,0.5)}
.forecast-card-y30{border-color:rgba(240,165,0,0.55);background:rgba(240,165,0,0.03)}
.forecast-card-tag{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.forecast-card-total{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text);margin:2px 0}
.forecast-card-y30 .forecast-card-total{color:#f0a500}
.forecast-card-rows{display:flex;flex-direction:column;gap:3px;border-top:1px solid var(--border);padding-top:6px}
.forecast-card-row{display:flex;justify-content:space-between;align-items:center}
.forecast-card-lbl{font-size:9px;color:var(--text3)}
.forecast-card-num{font-family:var(--mono);font-size:10px;color:var(--text2);font-weight:500}
.forecast-card-num.pos{color:var(--green)}
.fc-canvas-wrap{position:relative}
.forecast-table{width:100%;border-collapse:collapse;font-size:11px}
.forecast-table th{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:5px 8px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.forecast-table th:first-child{text-align:left}
.forecast-table td{padding:4px 8px;border-bottom:1px solid rgba(128,128,128,0.07);text-align:right;font-family:var(--mono);font-size:11px;color:var(--text2)}
.forecast-table td:first-child{text-align:left;color:var(--text3);font-family:inherit;font-size:10px}
.forecast-table tr.fc-milestone td{color:var(--text);font-weight:600;background:rgba(128,128,128,0.05)}
.forecast-table tr.fc-milestone td:first-child{color:var(--green)}
.forecast-table .pos{color:var(--green)}
@media(max-width:680px){.forecast-cards{grid-template-columns:1fr}.forecast-controls{flex-direction:column}}
/* ALERTS */
.alert-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.alert-row:last-child{border-bottom:none}
.alert-type{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.alert-above{background:rgba(23,232,161,.12);color:var(--green)}
.alert-below{background:rgba(255,77,114,.12);color:var(--red)}
/* TRADES */
.trade-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;flex-wrap:wrap}
.trade-row:last-child{border-bottom:none}
/* BENCHMARK */
.bench-sel{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.bench-pill{padding:2px 8px;border-radius:10px;font-size:9px;cursor:pointer;border:1px solid var(--border2);color:var(--text3);background:transparent;transition:all .1s}
.bench-pill.active{background:var(--acc);border-color:var(--acc);color:#fff}
/* LOTS */
.lots-table{width:100%;font-size:10px;border-collapse:collapse;margin-top:6px}
.lots-table th{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;padding:3px 5px;border-bottom:1px solid var(--border);text-align:left}
.lots-table td{padding:4px 5px;border-bottom:1px solid var(--border);font-family:var(--mono)}
.lots-table tr:last-child td{border-bottom:none}
/* PRINT */
@media print{
  .sidebar,.topbar,.page-hdr,.tabs,.pills,.search-row,.undo-bar,.toast-ctr,.sidebar-backdrop,
  .site-footer,.cookie-banner,.legal-modal-overlay,.overlay,.btn{display:none!important}
  .main{margin-left:0!important}.app{height:auto;overflow:visible}
  body,html{background:#fff;color:#000;overflow:visible}
  .hero{background:#f5f5f5;border:1px solid #ddd;-webkit-print-color-adjust:exact}
  .hero-val,.hstat-val,.hero-gain{color:#000!important}
  .tbl-wrap{overflow:visible}.chart-card,.bar-card,.snapshot-card,.sector-card{page-break-inside:avoid}
  .content{padding:12px}.hero{margin:0 0 8px}.tabs{margin:0 0 8px}.charts-row,.chart-card{margin-bottom:8px}
}
/* SIDEBAR BACKDROP */
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;cursor:pointer}
/* MOBILE ≤640px */
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:100;box-shadow:2px 0 16px rgba(0,0,0,.35)}
  .sidebar:not(.collapsed){width:224px;min-width:224px}
  .sb-scroll{overflow-y:auto;overflow-x:hidden}
  .main{margin-left:44px}
  .sb-actions{max-height:40vh;overflow-y:auto}
  .sidebar-backdrop{display:block}
  .content{padding:10px 8px}
  .page-hdr{padding:10px 10px 6px}
  td{padding:5px 7px;font-size:10px}
  thead th{padding:5px 7px;font-size:8px}
  .topbar{padding:0 8px}
  .charts-row{grid-template-columns:1fr}
  .hero{flex-direction:column;gap:8px;margin:0 8px 10px}
  .tabs{margin:0 8px 10px}
  .hero-stats{flex-wrap:wrap;gap:8px}
  .auth-card{width:90vw;padding:24px 18px}
}
/* TABLET 641-1024px */
@media(min-width:641px) and (max-width:1024px){
  .hero-stats{flex-wrap:wrap}
  .content{padding:12px 14px}
}

/* ─── ENHANCED UI ─── */

/* Dark-only gradients */
html:not(.light) .sidebar{background:linear-gradient(180deg,var(--bg2),#090a0f)}
html:not(.light) .topbar{background:linear-gradient(180deg,var(--bg2),var(--bg))}
html:not(.light) .sb-actions{background:linear-gradient(0deg,rgba(0,0,0,.3),transparent)}

/* Light theme sidebar */
html.light .sidebar{background:var(--bg2);border-right-color:var(--border)}
html.light .sb-item.active{background:var(--acc3)}
html.light .hero{box-shadow:var(--shadow-sm)}
html.light .hero::after{background:linear-gradient(90deg,transparent,rgba(37,99,235,.2) 35%,rgba(10,175,120,.2) 70%,transparent)}
html.light .topbar::after{background:linear-gradient(90deg,transparent,rgba(37,99,235,.15) 30%,rgba(10,175,120,.15) 70%,transparent)}

/* Topbar accent line */
.topbar{position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(90,159,255,.3) 30%,rgba(32,232,160,.3) 70%,transparent)}

.region-filter{border-color:var(--border);background:var(--bg3);border-radius:10px;box-shadow:var(--shadow-xs)}
.region-btn{transition:all .15s var(--ease)}
.region-btn.active{box-shadow:var(--shadow-inset)}

/* Sidebar label */
.sb-lbl{font-size:8px;font-weight:700;letter-spacing:.12em;color:var(--text4)}

/* Share SNS buttons hover lift */
.share-sns-btn{transition:all .18s var(--ease)}
.share-sns-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.5)}

/* Positive/Negative */
.pos{color:var(--green) !important}
.neg{color:var(--red) !important}

function checkRL(api){
  const rl=getRLS(),s=rl[api];
  if(!s) return null;
  if(Date.now()<s.resetAt) return s;
  const nr={...rl};delete nr[api];setRLS(nr);return null;
}
function markRL(api){
  const cfg={finnhub:{ms:61000},twelve:{ms:86400000},alpha:{ms:86400000}}[api]||{ms:60000};

}
function fmtReset(ts,lang){
  var l=T[lang||'ko'];
  if(!ts) return l.shortly;
  const d=ts-Date.now();
  if(d<=0) return l.justNow;
  const s=Math.ceil(d/1000),m=Math.ceil(s/60),h=Math.ceil(m/60);
  if(s<60) return l.sec(s);
  if(m<60) return l.min(m);
  if(h<24) return l.hr(h);
  const dt=new Date(ts);
  return (dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
}

class RLError extends Error{constructor(api){super('rl');this.api=api}}
function fetchTO(url,ms=9000){
  return Promise.race([fetch(url),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms))]);
}

async function fetchFinnhub(tickers,key){
  if(!key) throw new Error('no_key');
  const out={};
  for(let i=0;i<tickers.length;i++){
    const t=tickers[i];
    try{
      const res=await fetchTO('https://finnhub.io/api/v1/quote?symbol='+t+'&token='+key);
      if(res.status===429) throw new RLError('finnhub');
      const data=await res.json();
      if(data.error&&/limit/i.test(data.error)) throw new RLError('finnhub');
      if(data.c>0) out[t]=data.c;
    }catch(e){if(e instanceof RLError) throw e;}
    await new Promise(function(r){setTimeout(r,120)});
  }
  return out;
}

async function fetchTwelve(tickers,key){
  if(!key) throw new Error('no_key');
  const out={};
  const BATCH=8;
  for(let i=0;i<tickers.length;i+=BATCH){
    const batch=tickers.slice(i,i+BATCH);
    const res=await fetchTO('https://api.twelvedata.com/price?symbol='+encodeURIComponent(batch.join(','))+'&apikey='+key);
    const data=await res.json();
    if(data.code===429||data.status==='error') throw new RLError('twelve');
    if(batch.length===1){if(data.price) out[batch[0]]=parseFloat(data.price)}
    else batch.forEach(function(t){if(data[t]&&data[t].price) out[t]=parseFloat(data[t].price)});
    if(i+BATCH<tickers.length) await new Promise(function(r){setTimeout(r,500)});
  }
  return out;
}

async function fetchAlpha(tickers,key){
  if(!key) throw new Error('no_key');
  const out={};
  for(let i=0;i<Math.min(tickers.length,5);i++){
    const t=tickers[i];
    const res=await fetchTO('https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol='+t+'&apikey='+key);
    const data=await res.json();
    if(data.Note||data.Information) throw new RLError('alpha');
    const gq=data['Global Quote'];
    const p=gq&&parseFloat(gq['05. price']);
    if(p>0) out[t]=p;
    await new Promise(function(r){setTimeout(r,300)});
  }
  return out;
}

async function fetchAllPrices(positions,apiKeys,onStatus,lang){
  var l=T[lang||'ko'];
  const tickers=[...new Set(positions.map(function(p){return p.ticker}))];
  const usTickers=tickers.filter(function(t){return !isKR(t)});
  const prices={},msgs=[];

  // 1. Finnhub
  const miss1=usTickers.filter(function(t){return !prices[t]});
  const frl=checkRL('finnhub');
  if(miss1.length>0&&apiKeys.finnhub&&!frl){
    onStatus(l.fetchFinnhub);
    try{
      const p=await fetchFinnhub(miss1,apiKeys.finnhub);
      Object.assign(prices,p);
      const n=Object.keys(p).length;
      if(n>0) msgs.push({type:'success',text:l.finnhubOk(n),sub:null});
    }catch(e){
      if(e instanceof RLError){
        const info=markRL('finnhub');
        msgs.push({type:'limit',text:l.finnhubLimitTxt,sub:l.autoRetry(fmtReset(info.resetAt,lang))});
      }
    }
  }else if(frl&&apiKeys.finnhub&&miss1.length>0){
    msgs.push({type:'limit',text:l.finnhubWait,sub:'📅 '+fmtReset(frl.resetAt,lang)});
  }

  // 2. Twelve Data
  const miss2=usTickers.filter(function(t){return !prices[t]});
  const trl=checkRL('twelve');
  if(miss2.length>0&&apiKeys.twelve&&!trl){
    onStatus(l.fetchTwelve);
    try{
      const p=await fetchTwelve(miss2,apiKeys.twelve);
      Object.assign(prices,p);
      const n=Object.keys(p).length;
      if(n>0) msgs.push({type:'success',text:l.twelveOk(n),sub:null});
    }catch(e){
      if(e instanceof RLError){
        const info=markRL('twelve');
        msgs.push({type:'limit',text:l.twelveLimitTxt,sub:l.twelveLimitSub(fmtReset(info.resetAt,lang))});
      }
    }
  }else if(trl&&apiKeys.twelve&&miss2.length>0){
    msgs.push({type:'limit',text:l.twelveWait,sub:'📅 '+fmtReset(trl.resetAt,lang)});
  }

  // 3. Alpha Vantage
  const miss3=usTickers.filter(function(t){return !prices[t]});
  const arl=checkRL('alpha');
  if(miss3.length>0&&apiKeys.alpha&&!arl){
    onStatus(l.fetchAlpha);
    try{
      const p=await fetchAlpha(miss3,apiKeys.alpha);
      Object.assign(prices,p);
      const n=Object.keys(p).length;
      if(n>0) msgs.push({type:'success',text:l.alphaOk(n),sub:null});
    }catch(e){
      if(e instanceof RLError){
        const info=markRL('alpha');
        msgs.push({type:'limit',text:l.alphaLimitTxt,sub:l.alphaLimitSub(fmtReset(info.resetAt,lang))});
      }
    }
  }else if(arl&&apiKeys.alpha&&miss3.length>0){
    msgs.push({type:'limit',text:l.alphaWait,sub:'📅 '+fmtReset(arl.resetAt,lang)});
  }

  const noKeys=!apiKeys.finnhub&&!apiKeys.twelve&&!apiKeys.alpha;
  if(noKeys&&tickers.length>0&&Object.keys(prices).length===0){
    msgs.push({type:'warn',text:l.noApiKeysTxt,sub:l.noApiKeysSub});
  }

  const stillMissing=tickers.filter(function(t){return !prices[t]});
  if(stillMissing.length>0&&tickers.length>0&&!noKeys){
    msgs.push({type:'warn',text:l.missedTxt(stillMissing.length),sub:l.missedSub});
  }

  return{prices:prices,msgs:msgs};
}

function generateSalt(){var arr=new Uint8Array(16);crypto.getRandomValues(arr);return Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}
async function hashText(text){var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}

// ── 포트폴리오 계산 ──
function calcPort(pos,prices,usdRate){
  var cost=0,val=0,div=0;
  var dbm=Array(12).fill(0);
  pos.forEach(function(p){
    var st=STOCKS.find(function(s){return s.t===p.ticker});
    var rate=st&&st.cur==='KRW'?(usdRate||1370):1;
    var cur=(prices[p.ticker]||p.buyPrice)/rate;
    var bp=p.buyPrice/rate;
    cost+=p.shares*bp; val+=p.shares*cur;
    var dy=p.divYield!==undefined?p.divYield:0;
    var ann=(p.shares*cur)*(dy/100); div+=ann;
    var isETF=st&&st.s==='ETF';
    for(var m=0;m<12;m++){
      if(isETF) dbm[m]+=ann/12;
      else if([2,5,8,11].indexOf(m)>=0) dbm[m]+=ann/4;
    }
  });
  return{cost:cost,val:val,gain:val-cost,gainPct:cost?(val-cost)/cost*100:0,div:div,dbm:dbm};
}

function calcComp(pos,prices,usdRate){
  var byT={};
  pos.forEach(function(p){
    var st=STOCKS.find(function(s){return s.t===p.ticker});
    var rate=st&&st.cur==='KRW'?(usdRate||1370):1;
    var cur=(prices[p.ticker]||p.buyPrice)/rate;
    var v=p.shares*cur;
    if(!byT[p.ticker]) byT[p.ticker]={ticker:p.ticker,name:p.name||p.ticker,val:0,div:0};
    byT[p.ticker].val+=v;
    byT[p.ticker].div+=v*((p.divYield||0)/100);
  });
  return Object.values(byT).sort(function(a,b){return b.val-a.val});
}

function calcSec(pos,prices,usdRate){
  var bs={};var tot=0;
  pos.forEach(function(p){
    var st=STOCKS.find(function(s){return s.t===p.ticker});
    var rate=st&&st.cur==='KRW'?(usdRate||1370):1;
    var cur=(prices[p.ticker]||p.buyPrice)/rate;
    var v=p.shares*cur;
    var sec=st?st.s:'Other';
    bs[sec]=(bs[sec]||0)+v; tot+=v;
  });
  return Object.entries(bs).map(function(e){return{s:e[0],v:e[1],pct:tot?e[1]/tot*100:0}}).sort(function(a,b){return b.v-a.v});
}

function TreemapChart(props){
  var positions=props.positions,prices=props.prices,usdRate=props.usdRate,portVal=props.portVal,lang=props.lang||'ko';
  var l=T[lang];
  var ref=useRef(null);
  useEffect(function(){
    var el=ref.current;if(!el) return;
    var W=el.offsetWidth,H=el.offsetHeight;if(!W||!H) return;
    var ctx=el.getContext('2d');
    ctx.clearRect(0,0,W,H);
    var items=positions.map(function(p){
      var st=STOCKS.find(function(s){return s.t===p.ticker});
      var rate=st&&st.cur==='KRW'?(usdRate||1370):1;
      var cur=(prices[p.ticker]||p.buyPrice)/rate;
      var val=p.shares*cur;
      var cost=p.shares*(p.buyPrice/rate);
      var pct=cost>0?(val-cost)/cost*100:0;
      return {ticker:dispTicker(p.ticker),val:val,pct:pct};
    }).filter(function(x){return x.val>0}).sort(function(a,b){return b.val-a.val});
    if(!items.length) return;
    var total=items.reduce(function(s,x){return s+x.val},0);
    // squarified treemap layout
    function heatCol(pct){
      var c=Math.max(-30,Math.min(30,pct)),t=Math.abs(c)/30;
      return c>=0?'rgba(23,232,161,'+(0.15+t*0.5)+')':'rgba(255,77,114,'+(0.15+t*0.5)+')';
    }
    var rects=[];
    function layout(nodes,x,y,w,h){
      if(!nodes.length) return;
      if(nodes.length===1){rects.push({x:x,y:y,w:w,h:h,item:nodes[0]});return}
      var half=nodes.slice(0,Math.ceil(nodes.length/2)),rest=nodes.slice(Math.ceil(nodes.length/2));
      var hSum=half.reduce(function(s,n){return s+n.val},0),ratio=hSum/total;
      if(w>=h){layout(half,x,y,w*ratio,h);layout(rest,x+w*ratio,y,w*(1-ratio),h);}
      else{layout(half,x,y,w,h*ratio);layout(rest,x,y+h*ratio,w,h*(1-ratio));}
    }
    layout(items,0,0,W,H);
    rects.forEach(function(r){
      ctx.fillStyle=heatCol(r.item.pct);
      ctx.fillRect(r.x+1,r.y+1,r.w-2,r.h-2);
      ctx.strokeStyle='rgba(0,0,0,.15)';ctx.strokeRect(r.x+1,r.y+1,r.w-2,r.h-2);
      if(r.w>35&&r.h>22){
        ctx.fillStyle='rgba(255,255,255,.9)';
        ctx.font='bold '+(Math.min(13,r.w/5))+'px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(r.item.ticker,r.x+r.w/2,r.y+r.h/2-5);
        ctx.font=(Math.min(10,r.w/6))+'px sans-serif';
        ctx.fillStyle=r.item.pct>=0?'rgba(23,232,161,.9)':'rgba(255,77,114,.9)';
        ctx.fillText((r.item.pct>=0?'+':'')+r.item.pct.toFixed(1)+'%',r.x+r.w/2,r.y+r.h/2+8);
      }
    });
  },[positions,prices,usdRate,portVal]);
  if(!positions.length) return React.createElement('div',{className:'empty',style:{padding:20}},React.createElement('div',{className:'empty-icon'},'🗺️'),l.treemapEmpty);
  return React.createElement('canvas',{ref:ref,className:'treemap-wrap',width:600,height:200,style:{width:'100%',height:200}});
}
