  var onClose=props.onClose||function(){};
  var lang=props.lang||'ko';
  var l=T[lang];
  var port=props.port||{val:0,gain:0,gainPct:0,cost:0,div:0};
  var positions=props.positions||[];
  var prices=props.prices||{};
  var usdRate=props.usdRate||1370;
  var useState=React.useState;
  var copied=useState(false);var setCopied=copied[1];copied=copied[0];
  var capturing=useState(false);var setCapturing=capturing[1];capturing=capturing[0];
  var preview=useState(null);var setPreview=preview[1];preview=preview[0];

  var siteUrl='https://stockinvestonline.com';
  var shareText=lang==='ko'
    ?'무료 주식 포트폴리오 관리 도구 - 미국/한국 주식 ETF 수익률, 배당금, 섹터분석 한눈에!'
    :'Free stock portfolio manager - Track US/Korean stocks, dividends & sector analysis!';

  function copyLink(){
    if(navigator.clipboard){
      navigator.clipboard.writeText(siteUrl).then(function(){
        setCopied(true);
        setTimeout(function(){setCopied(false)},2000);
      });
    }
  }

  function openTwitter(){
    var url='https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)+'&url='+encodeURIComponent(siteUrl);
    window.open(url,'_blank','noopener,noreferrer');
  }

  function openFacebook(){
    var url='https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(siteUrl);
    window.open(url,'_blank','noopener,noreferrer');
  }

  function openTelegram(){
    var url='https://t.me/share/url?url='+encodeURIComponent(siteUrl)+'&text='+encodeURIComponent(shareText);
    window.open(url,'_blank','noopener,noreferrer');
  }

  function rr(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  function captureAndShare(){
    setCapturing(true);
    try{
      // ── 리포트 데이터 계산 ──
      var rate0=usdRate||1370;
      var pdata=positions.map(function(p){
        var st=STOCKS.find(function(s){return s.t===p.ticker});
        var isKorean=st?(st.cur==='KRW'):isKR(p.ticker);
        var r=isKorean?rate0:1;
        var curP=(prices[p.ticker]||p.buyPrice)/r;
        var buyP=p.buyPrice/r;
        var curVal=p.shares*curP;
        var cost=p.shares*buyP;
        var gain=curVal-cost;
        var gainPct=cost>0?gain/cost*100:0;
        var annDiv=p.shares*curP*((p.divYield||0)/100);
        var divTax=isKorean?annDiv*0.154:annDiv*0.15;
        var region=isKorean?'KR':'US';
        var sector=st?st.s:'Other';
        return {ticker:dispTicker(p.ticker),name:st?st.n:p.ticker,region:region,sector:sector,
          curVal:curVal,cost:cost,gain:gain,gainPct:gainPct,annDiv:annDiv,divTax:divTax,
          annDivAfter:annDiv-divTax,weight:port.val>0?curVal/port.val*100:0};
      });
      var usPdata=pdata.filter(function(p){return p.region==='US'});
      var krPdata=pdata.filter(function(p){return p.region==='KR'});
      var usDivTotal=usPdata.reduce(function(s,p){return s+p.annDiv},0);
      var krDivTotal=krPdata.reduce(function(s,p){return s+p.annDiv},0);
      var totalDivBefore=usDivTotal+krDivTotal;
      var totalDivAfter=usPdata.reduce(function(s,p){return s+p.annDivAfter},0)+krPdata.reduce(function(s,p){return s+p.annDivAfter},0);
      var usVal=usPdata.reduce(function(s,p){return s+p.curVal},0);
      var krVal=krPdata.reduce(function(s,p){return s+p.curVal},0);
      var usPct=port.val>0?usVal/port.val*100:0;
      var krPct=port.val>0?krVal/port.val*100:0;
      var effYield=port.val>0?totalDivAfter/port.val*100:0;
      var sectors={};
      pdata.forEach(function(p){sectors[p.sector]=(sectors[p.sector]||0)+p.curVal});
      var sectorList=Object.entries(sectors).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
      var top5=pdata.slice().sort(function(a,b){return b.curVal-a.curVal}).slice(0,5);
      var numSectors=Object.keys(sectors).length;
      var top5Val=top5.reduce(function(s,p){return s+p.curVal},0);
      var conc=port.val>0?top5Val/port.val*100:0;

      // ── 숫자 포맷 ──
      function fB(v){if(v>=1e6)return '$'+(v/1e6).toFixed(2)+'M';if(v>=1000)return '$'+(v/1000).toFixed(1)+'K';return '$'+Math.round(v).toLocaleString('en');}
      function fM(v){return '$'+Math.round(v).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0});}

      // ── 캔버스 ──
      var W=1200;var H=630;
      var canvas=document.createElement('canvas');
      canvas.width=W;canvas.height=H;
      var ctx=canvas.getContext('2d');

      // BG
      ctx.fillStyle='#000000';ctx.fillRect(0,0,W,H);
      var grd=ctx.createRadialGradient(W*0.25,H*0.35,0,W*0.25,H*0.35,W*0.55);
      grd.addColorStop(0,'rgba(0,200,110,0.07)');grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

      // 수직 구분선 (좌우 패널 사이) x=660
      ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(660,90);ctx.lineTo(660,580);ctx.stroke();

      // ── HEADER ──
      ctx.fillStyle='#3d8ef8';ctx.font='bold 18px monospace';ctx.textAlign='left';
      ctx.fillText('\u25b8 PORTFOLIO',60,55);
      ctx.fillStyle='#17e8a1';ctx.font='bold 12px sans-serif';
      ctx.fillText('  PRO',180,55);
      var today=new Date().toLocaleDateString(lang==='ko'?'ko-KR':'en-US',{year:'numeric',month:'short',day:'numeric'});
      ctx.fillStyle='#444444';ctx.font='13px sans-serif';ctx.textAlign='right';
      ctx.fillText(lang==='ko'?'포트폴리오 종합 리포트':'Portfolio Comprehensive Report',W-60,40);
      ctx.fillText(today,W-60,58);
      ctx.textAlign='left';
      // header gradient line
      var hg=ctx.createLinearGradient(0,0,W,0);
      hg.addColorStop(0,'rgba(61,142,248,0)');hg.addColorStop(0.3,'rgba(61,142,248,0.6)');
      hg.addColorStop(0.7,'rgba(23,232,161,0.6)');hg.addColorStop(1,'rgba(23,232,161,0)');
      ctx.strokeStyle=hg;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(60,70);ctx.lineTo(W-60,70);ctx.stroke();

      // ── 좌측: SUMMARY ──
      ctx.fillStyle='#444444';ctx.font='bold 10px sans-serif';
      ctx.fillText(lang==='ko'?'현황 요약':'SUMMARY',60,94);

      // 6개 통계 카드 (3×2 grid)
      var sumStats=[
        {lbl:lang==='ko'?'총 평가액':'Total Value',val:fM(port.val||0),color:'#f0f0f0'},
        {lbl:lang==='ko'?'총 손익':'Total P&L',val:(port.gain>=0?'+':'')+fB(port.gain||0),color:(port.gain||0)>=0?'#17e8a1':'#ff4d72'},
        {lbl:lang==='ko'?'수익률':'Return',val:(port.gainPct>=0?'+':'')+((port.gainPct||0).toFixed(2))+'%',color:(port.gainPct||0)>=0?'#17e8a1':'#ff4d72'},
        {lbl:lang==='ko'?'투자 원금':'Cost Basis',val:fM(port.cost||0),color:'#aaaaaa'},
        {lbl:lang==='ko'?'연간 배당':'Annual Div',val:fB(totalDivBefore),color:'#ffb800'},
        {lbl:lang==='ko'?'세후 배당':'After-tax Div',val:fB(totalDivAfter),color:'#4d9eff'},
      ];
      var sW=182;var sH=86;var sGap=8;var sX0=60;var sY0=104;
      sumStats.forEach(function(s,i){
        var col=i%3;var row=Math.floor(i/3);
        var sx=sX0+col*(sW+sGap);var sy=sY0+row*(sH+sGap);
        ctx.fillStyle='#0f0f0f';rr(ctx,sx,sy,sW,sH,8);ctx.fill();
        ctx.strokeStyle='#222222';ctx.lineWidth=1;rr(ctx,sx,sy,sW,sH,8);ctx.stroke();
        ctx.fillStyle='#555555';ctx.font='10px sans-serif';ctx.textAlign='left';
        ctx.fillText(s.lbl,sx+12,sy+20);
        ctx.fillStyle=s.color;ctx.font='bold 22px monospace';
        ctx.fillText(s.val,sx+12,sy+62);
      });

      // 실효 배당률 + 종목 수 + 섹터 수
      var metaY=sY0+2*(sH+sGap)+14;
      var metaItems=[
        {lbl:lang==='ko'?'세후 실효 배당률':'Eff. Div Yield',val:effYield.toFixed(2)+'%',color:'#4d9eff'},
        {lbl:lang==='ko'?'보유 종목':'Positions',val:String(positions.length),color:'#f0f0f0'},
        {lbl:lang==='ko'?'섹터 수':'Sectors',val:String(numSectors),color:'#a78bfa'},
        {lbl:lang==='ko'?'상위5 집중도':'Top5 Conc.',val:conc.toFixed(1)+'%',color:conc>60?'#ff4d72':conc>40?'#ffb800':'#17e8a1'},
      ];
      metaItems.forEach(function(m,i){
        var mx=sX0+i*146;
        ctx.fillStyle='#555555';ctx.font='9px sans-serif';ctx.textAlign='left';
        ctx.fillText(m.lbl,mx,metaY);
        ctx.fillStyle=m.color;ctx.font='bold 15px monospace';
        ctx.fillText(m.val,mx,metaY+18);
      });

      // 지역 배분 바
      var rY=metaY+40;
      ctx.fillStyle='#444444';ctx.font='bold 10px sans-serif';
      ctx.fillText(lang==='ko'?'지역 배분':'REGION',60,rY);
      var barMaxW=520;var barH=18;
      // US bar
      ctx.fillStyle='#1a2a3a';ctx.fillRect(60,rY+8,barMaxW,barH);
      ctx.fillStyle='#3d8ef8';ctx.fillRect(60,rY+8,barMaxW*usPct/100,barH);
      ctx.fillStyle='#aaaaaa';ctx.font='11px sans-serif';ctx.textAlign='left';
      ctx.fillText('US  '+usPct.toFixed(1)+'%',590,rY+21);
      // KR bar
      ctx.fillStyle='#1a1a2a';ctx.fillRect(60,rY+32,barMaxW,barH);
      ctx.fillStyle='#a78bfa';ctx.fillRect(60,rY+32,barMaxW*krPct/100,barH);
      ctx.fillText('KR  '+krPct.toFixed(1)+'%',590,rY+45);

      // ── 우측: TOP HOLDINGS ──
      var rx=680;
      ctx.fillStyle='#444444';ctx.font='bold 10px sans-serif';ctx.textAlign='left';
      ctx.fillText(lang==='ko'?'보유 상위 종목':'TOP HOLDINGS',rx,94);

      var SECT_COLORS={'Technology':'#5b9bd5','Healthcare':'#17e8a1','Consumer':'#f0a500',
        'Financials':'#ff6b6b','Energy':'#fb923c','Industrials':'#34d399','ETF':'#4d9eff',
        'Real Estate':'#f472b6','Telecom':'#60a5fa','Entertainment':'#fbbf24','Other':'#666666'};
      top5.forEach(function(p,i){
        var ty=108+i*46;
        // row bg
        ctx.fillStyle=i%2===0?'#0c0c0c':'#0a0a0a';
        ctx.fillRect(rx,ty,460,40);
        // rank dot
        ctx.fillStyle='#333333';ctx.font='bold 11px monospace';ctx.textAlign='left';
        ctx.fillText(String(i+1),rx+6,ty+25);
        // sector color dot
        var sc=SECT_COLORS[p.sector]||'#666666';
        ctx.fillStyle=sc;ctx.beginPath();ctx.arc(rx+24,ty+20,4,0,Math.PI*2);ctx.fill();
        // ticker
        ctx.fillStyle='#f0f0f0';ctx.font='bold 14px monospace';
        ctx.fillText(p.ticker,rx+34,ty+26);
        // weight
        ctx.fillStyle='#555555';ctx.font='11px sans-serif';
        ctx.fillText(p.weight.toFixed(1)+'%',rx+110,ty+26);
        // value
        ctx.fillStyle='#aaaaaa';ctx.font='12px monospace';
        ctx.fillText(fB(p.curVal),rx+170,ty+26);
        // gain
        ctx.fillStyle=p.gain>=0?'#17e8a1':'#ff4d72';ctx.font='bold 12px monospace';ctx.textAlign='right';
        ctx.fillText((p.gainPct>=0?'+':'')+p.gainPct.toFixed(1)+'%',rx+455,ty+26);
        ctx.textAlign='left';
      });

      // 구분선
      ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(rx,345);ctx.lineTo(rx+460,345);ctx.stroke();

      // 섹터 배분
      ctx.fillStyle='#444444';ctx.font='bold 10px sans-serif';
      ctx.fillText(lang==='ko'?'섹터 배분':'SECTOR ALLOCATION',rx,362);
      var sBarMaxW=300;
      sectorList.forEach(function(sv,i){
        var sy2=375+i*38;
        var pct=port.val>0?sv[1]/port.val*100:0;
        var col2=SECT_COLORS[sv[0]]||'#555555';
        // label
        var lbl2=sv[0].length>12?sv[0].slice(0,12)+'…':sv[0];
        ctx.fillStyle='#888888';ctx.font='11px sans-serif';ctx.textAlign='left';
        ctx.fillText(lbl2,rx,sy2+12);
        // bar bg
        ctx.fillStyle='#181818';ctx.fillRect(rx+130,sy2,sBarMaxW,14);
        // bar fill
        ctx.fillStyle=col2;ctx.globalAlpha=0.75;
        ctx.fillRect(rx+130,sy2,sBarMaxW*pct/100,14);
        ctx.globalAlpha=1;
        // pct text
        ctx.fillStyle='#777777';ctx.font='10px monospace';ctx.textAlign='right';
        ctx.fillText(pct.toFixed(1)+'%',rx+455,sy2+11);
        ctx.textAlign='left';
      });

      // ── FOOTER ──
      ctx.fillStyle='#0d0d0d';ctx.fillRect(0,H-44,W,44);
      ctx.strokeStyle='#1f1f1f';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,H-44);ctx.lineTo(W,H-44);ctx.stroke();
      ctx.fillStyle='#404040';ctx.font='12px sans-serif';ctx.textAlign='left';
      ctx.fillText('\uD83D\uDCC8 Portfolio Manager Pro  ·  '+(lang==='ko'?'종합 리포트  ·  무료 주식 포트폴리오 관리':'Comprehensive Report  ·  Free Stock Portfolio Tracker'),60,H-16);
      ctx.fillStyle='#3d8ef8';ctx.textAlign='right';
      ctx.fillText('stockinvestonline.com',W-60,H-16);

      var dataUrl=canvas.toDataURL('image/png');
      setPreview(dataUrl);
    }catch(e){console.error(e);}
    setCapturing(false);
  }

  function downloadImage(){
    if(!preview)return;
    var a=document.createElement('a');
    a.href=preview;
    a.download='portfolio-'+(new Date().toISOString().slice(0,10))+'.png';
    a.click();
  }

  function webShare(){
    if(!preview)return;
    fetch(preview).then(function(r){return r.blob();}).then(function(blob){
      var file=new File([blob],'portfolio.png',{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({
          title:lang==='ko'?'내 포트폴리오':'My Portfolio',
          text:shareText,
          files:[file]
        }).catch(function(){});
      } else {
        downloadImage();
      }
    });
  }

  var canWebShare=typeof navigator!=='undefined'&&navigator.share&&navigator.canShare;

  return React.createElement('div',{className:'share-modal-overlay',onClick:function(e){if(e.target===e.currentTarget)onClose()}},
    React.createElement('div',{className:'share-modal'},
      React.createElement('div',{className:'share-modal-title'},
        l.shareTitle,
        React.createElement('button',{className:'share-close',onClick:onClose},'✕')
      ),
      // SNS buttons
      React.createElement('div',{className:'share-sns-grid'},
        React.createElement('button',{className:'share-sns-btn',onClick:openTwitter},
          React.createElement('span',{className:'share-sns-icon'},'𝕏'),
          l.shareTwitter
        ),
        React.createElement('button',{className:'share-sns-btn',onClick:openFacebook},
          React.createElement('span',{className:'share-sns-icon'},'f'),
          l.shareFacebook
        ),
        React.createElement('button',{className:'share-sns-btn',onClick:openTelegram},
          React.createElement('span',{className:'share-sns-icon'},'✈'),
          l.shareTelegram
        ),
        React.createElement('button',{className:'share-sns-btn',onClick:copyLink},
          React.createElement('span',{className:'share-sns-icon'},copied?'✓':'🔗'),
          copied?l.shareCopied:l.shareCopyLink
        )
      ),
      // URL copy row
      React.createElement('div',{className:'share-url-row'},
        React.createElement('input',{className:'share-url-input',readOnly:true,value:siteUrl,onFocus:function(e){e.target.select()}}),
        React.createElement('button',{className:'btn btn-sm share-url-copy',onClick:copyLink},copied?l.shareCopied:l.shareCopyLink)
      ),
      React.createElement('hr',{className:'share-divider'}),
      // Screenshot capture section
      React.createElement('div',{className:'share-cap-area'},
        React.createElement('div',{className:'share-cap-label'},l.shareCaptureHint),
        !preview&&React.createElement('button',{className:'share-cap-btn',onClick:captureAndShare,disabled:capturing},
          React.createElement('span',null,'📸'),
          capturing?l.shareCapturing:l.shareCapture
        ),
        preview&&React.createElement(React.Fragment,null,
          React.createElement('div',{className:'share-cap-preview'},
            React.createElement('img',{src:preview,alt:'portfolio capture'})
          ),
          React.createElement('div',{style:{display:'flex',gap:6}},
            React.createElement('button',{className:'share-cap-btn',onClick:captureAndShare,disabled:capturing,style:{flex:1}},
              React.createElement('span',null,'📸'),
              l.shareCapture
            ),
            React.createElement('button',{className:'share-cap-btn',onClick:canWebShare?webShare:downloadImage,style:{flex:1,borderColor:'var(--acc)',color:'var(--acc)'}},
              React.createElement('span',null,canWebShare?'📤':'💾'),
              canWebShare?l.shareWebShare:l.shareDownload
            )
          )
        )
      )
    )
  );
}

  function importCSV(file){
    var reader=new FileReader();
    reader.onload=function(e){
      var allLines=e.target.result.split('\n').filter(function(l){return l.trim()&&!l.trim().startsWith('#')});
      if(allLines.length===0){showImportError('파일이 비어 있거나 주석(#)만 포함되어 있습니다.');return;}
      var firstVal=(allLines[0].split(',')[0]||'').trim().toLowerCase();
      var isHeader=firstVal==='ticker'||firstVal==='종목코드'||firstVal==='symbol';
      var dataLines=isHeader?allLines.slice(1):allLines;
      if(dataLines.length===0){showImportError('데이터가 없습니다.\n\n형식: ticker,name,account,shares,buyPrice,divYield\n\n예시:\nAAPL,애플,계좌명,10,150.00,0.5');return;}
      var skipped=[];
      var newPos=dataLines.map(function(line,idx){
        var vals=line.split(',');
        var ticker=(vals[0]||'').trim().toUpperCase();
        var sharesRaw=(vals[3]||'').trim();
        var shares=parseFloat(sharesRaw)||0;
        if(!ticker) skipped.push((idx+2)+'행: 티커(ticker)가 비어 있음 → "'+line.trim()+'"');
        else if(!(shares>0)) skipped.push((idx+2)+'행: 수량(shares)이 0이거나 숫자가 아님 (값: "'+sharesRaw+'") → "'+line.trim()+'"');
        return {id:Date.now()+idx,ticker:ticker,
          name:(vals[1]||'').replace(/"/g,'').trim(),
          account:(vals[2]||accounts[0]||'').replace(/"/g,'').trim(),
          shares:shares,buyPrice:parseFloat(vals[4])||0,divYield:parseFloat(vals[5])||0};
      }).filter(function(p){return p.ticker&&p.shares>0});
      if(newPos.length===0){
        var msg='가져온 종목이 없습니다.\n\n필수 조건:\n  • ticker(종목코드) 필수\n  • shares(수량) > 0 필수\n\n예시:\nAAPL,애플,계좌명,10,150.00,0.5\n005930.KS,삼성전자,계좌명,5,72000,2.3';
        if(skipped.length>0) msg+='\n\n문제 행 ('+skipped.length+'건):\n'+skipped.join('\n');
        showImportError(msg);return;
      }
      var newAccounts=[];
      newPos.forEach(function(p){if(p.account&&!accounts.includes(p.account)&&!newAccounts.includes(p.account))newAccounts.push(p.account)});
      if(newAccounts.length>0) setAccounts(function(prev){return prev.concat(newAccounts)});
      setPositions(function(prev){return prev.concat(newPos)});
      var msg=newPos.length+'개 종목을 성공적으로 가져왔습니다.';
      if(newAccounts.length>0) msg+='\n\n새로 추가된 계좌 ('+newAccounts.length+'개):\n'+newAccounts.map(function(a){return '  + '+a}).join('\n');
      if(skipped.length>0) msg+='\n\n건너뛴 행 ('+skipped.length+'건):\n'+skipped.join('\n');
      showImportSuccess(msg);
    };
    reader.readAsText(file);
  }

var JSONBIN_BASE='https://api.jsonbin.io/v3';
var GUEST_WRITE_KEY='$2a$10$xAoxnsKKGqvwO3ZcsfIPJe79hoRyroVXLKSLo13M/P/muKk9dOKhu';
async function binFetch(binId){
  var res=await fetch(JSONBIN_BASE+'/b/'+binId+'/latest',{headers:{'X-Bin-Meta':'false'}});
  if(!res.ok) throw new Error('fetch fail');
  var data=await res.json();
  return Array.isArray(data.posts)?data.posts:[];
}
async function binSave(binId,writeKey,posts,useAccessKey){
  var headers={'Content-Type':'application/json'};
  headers[useAccessKey?'X-Access-Key':'X-Master-Key']=writeKey;
  var res=await fetch(JSONBIN_BASE+'/b/'+binId,{method:'PUT',headers:headers,body:JSON.stringify({posts:posts})});
  if(!res.ok) throw new Error('save fail');
}
async function binCreate(masterKey){
  var res=await fetch(JSONBIN_BASE+'/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':masterKey,'X-Bin-Name':'portfolio-board','X-Bin-Private':'false'},body:JSON.stringify({posts:[]})});
  if(!res.ok) throw new Error('create fail');
  var data=await res.json();
  return data.metadata&&data.metadata.id;
}
function getBoardSid(){
  var k='pfm3_board_sid';
  var sid=localStorage.getItem(k);
  if(!sid){sid='u_'+Math.random().toString(36).slice(2,10);localStorage.setItem(k,sid);}
  return sid;
}
function fmtRelTime(iso,l){
  var diff=Math.floor((Date.now()-new Date(iso))/1000);
  if(diff<60) return l.boardJustNow;
  if(diff<3600) return l.boardMinAgo(Math.floor(diff/60));
  if(diff<86400) return l.boardHrAgo(Math.floor(diff/3600));
  return l.boardDayAgo(Math.floor(diff/86400));
}
