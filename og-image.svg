  <!-- Logo / Brand -->
  <text x="80" y="140" font-family="monospace" font-size="18" font-weight="600" fill="#3d8ef8" letter-spacing="3">▸ PORTFOLIO</text>
  <rect x="270" y="117" width="34" height="18" rx="3" fill="#17e8a1" fill-opacity="0.18"/>
  <text x="278" y="130" font-family="monospace" font-size="11" font-weight="600" fill="#17e8a1" letter-spacing="1">PRO</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="sans-serif" font-size="52" font-weight="800" fill="#f0f0f0" letter-spacing="-1">주식 포트폴리오</text>
  <text x="80" y="305" font-family="sans-serif" font-size="52" font-weight="800" fill="#f0f0f0" letter-spacing="-1">무료 관리 &amp; 분석</text>

  <!-- Sub description -->
  <text x="80" y="360" font-family="sans-serif" font-size="20" fill="#aaaaaa">미국·한국 주식, ETF · 배당금 · 섹터분석 · 세금계산</text>

  <!-- Feature badges -->
  <rect x="80" y="400" width="140" height="36" rx="8" fill="#17e8a1" fill-opacity="0.12" stroke="#17e8a1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="150" y="423" font-family="sans-serif" font-size="13" font-weight="600" fill="#17e8a1" text-anchor="middle">실시간 가격</text>

  <rect x="234" y="400" width="140" height="36" rx="8" fill="#3d8ef8" fill-opacity="0.12" stroke="#3d8ef8" stroke-opacity="0.3" stroke-width="1"/>
  <text x="304" y="423" font-family="sans-serif" font-size="13" font-weight="600" fill="#3d8ef8" text-anchor="middle">배당금 추적</text>

  <rect x="388" y="400" width="140" height="36" rx="8" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="458" y="423" font-family="sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">섹터 분석</text>

  <rect x="542" y="400" width="130" height="36" rx="8" fill="#ffb800" fill-opacity="0.12" stroke="#ffb800" stroke-opacity="0.3" stroke-width="1"/>
  <text x="607" y="423" font-family="sans-serif" font-size="13" font-weight="600" fill="#ffb800" text-anchor="middle">세금 계산</text>

  <!-- URL -->
  <text x="80" y="520" font-family="monospace" font-size="16" fill="#555555" letter-spacing="1">stockinvestonline.com</text>

  <!-- Decorative stat cards (right side) -->
  <rect x="760" y="100" width="360" height="90" rx="12" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
  <text x="800" y="135" font-family="sans-serif" font-size="12" fill="#666666">TOTAL PORTFOLIO VALUE</text>
  <text x="800" y="170" font-family="monospace" font-size="28" font-weight="700" fill="#f0f0f0">$124,580</text>
  <text x="1050" y="170" font-family="sans-serif" font-size="16" font-weight="600" fill="#17e8a1">+18.4%</text>

  <rect x="760" y="210" width="170" height="80" rx="10" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
  <text x="790" y="240" font-family="sans-serif" font-size="11" fill="#666666">ANNUAL DIVIDEND</text>
  <text x="790" y="270" font-family="monospace" font-size="20" font-weight="700" fill="#ffb800">$3,240</text>

  <rect x="950" y="210" width="170" height="80" rx="10" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
  <text x="980" y="240" font-family="sans-serif" font-size="11" fill="#666666">POSITIONS</text>
  <text x="980" y="270" font-family="monospace" font-size="20" font-weight="700" fill="#4d9eff">24</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0d0d0d"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#1f1f1f" stroke-width="1"/>
  <text x="80" y="614" font-family="sans-serif" font-size="13" fill="#444444">© 2026 StockInvestOnline.com · 무료 · 데이터 로컬 저장 · 서버 전송 없음</text>
  <text x="1120" y="614" font-family="sans-serif" font-size="13" fill="#3d8ef8" text-anchor="end">FREE</text>
