<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#00d278;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3d8ef8;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#17e8a1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3d8ef8;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1f1f1f" stroke-width="1"/>

  <!-- Chart-like decorative element -->
  <polyline points="80,480 160,440 240,460 320,380 400,390 480,340 560,310 640,280 720,260 800,240 880,200 960,180 1040,160 1120,140"
    fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linejoin="round"/>
  <polyline points="80,480 160,440 240,460 320,380 400,390 480,340 560,310 640,280 720,260 800,240 880,200 960,180 1040,160 1120,140 1120,560 80,560"
